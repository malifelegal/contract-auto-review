module:
  id: X-CLOUD
  name: 클라우드·국외 위탁
  always_on: false
  activation: strong
  screening_question: 클라우드컴퓨팅서비스 이용 또는 국외 정보처리 요소가 있는가?
  suggest_keywords:
  - 클라우드
  - 국외
  - 해외 이전
  - AWS
  - Azure
  - 리전
checks:
- id: ITCL-01
  module: X-CLOUD
  check: 클라우드 이용업무의 중요도 평가에 필요한 자료 제공 협조 조항이 있는가
  label: 이용업무 중요도 평가
  severity: 필수
  severity_basis: 근거 조문이 강행규정(의무)임 — 전자금융감독규정 제14조의2
  norm_type: 강행
  basis: statute
  triggers:
    keywords:
    - 클라우드
    - 중요도 평가
    - 중요업무
  absence_check: true
  sources:
  - law: 전자금융감독규정
    article: 제14조의2
    clause: 제1항 제1호
    quote: 다음 각 목의 기준에 따른 이용업무의 중요도 평가
    verified: true
- id: ITCL-02
  module: X-CLOUD
  check: 클라우드컴퓨팅서비스 제공자의 건전성·안전성 평가에 필요한 자료 제공 협조 조항이 있는가
  label: 제공자 건전성·안전성 평가
  severity: 필수
  severity_basis: 근거 조문이 강행규정(의무)임 — 전자금융감독규정 제14조의2
  norm_type: 강행
  basis: statute
  triggers:
    keywords:
    - 클라우드
    - 건전성
    - 안전성
    - 평가
  absence_check: true
  sources:
  - law: 전자금융감독규정
    article: 제14조의2
    clause: 제1항 제2호
    quote: 클라우드컴퓨팅서비스 제공자의 건전성 및 안전성 등에 대한 평가
    verified: true
- id: ITCL-03
  module: X-CLOUD
  check: 클라우드 이용 관련 업무연속성 계획·안전성 확보조치의 수립·시행이 계약상 뒷받침되는가
  label: 업무연속성·안전성 확보
  severity: 필수
  severity_basis: 근거 조문이 강행규정(의무)임 — 전자금융감독규정 제14조의2
  norm_type: 강행
  basis: statute
  triggers:
    keywords:
    - 업무연속성
    - 안전성 확보조치
    - 클라우드
    - 재해복구
  absence_check: true
  sources:
  - law: 전자금융감독규정
    article: 제14조의2
    clause: 제1항 제3호
    quote: 클라우드컴퓨팅서비스 이용과 관련한 업무 연속성 계획 및 안전성 확보조치의 수립ㆍ시행
    verified: true
- id: ITCL-04
  module: X-CLOUD
  check: 평가결과·업무연속성 계획·안전성 확보조치에 대한 정보보호위원회 심의·의결 절차가 확인되는가
  label: 정보보호위원회 심의
  severity: 필수
  severity_basis: 근거 조문이 강행규정(의무)임 — 전자금융감독규정 제14조의2
  norm_type: 강행
  basis: statute
  triggers:
    keywords:
    - 정보보호위원회
    - 심의
    - 의결
  absence_check: false
  sources:
  - law: 전자금융감독규정
    article: 제14조의2
    clause: 제2항
    quote: 제1항 각 호에 따른 평가결과, 업무연속성 계획 및 안전성 확보조치에 대하여 제8조의2에 따른 정보보호위원회의 심의ㆍ의결을 거쳐야 한다
    verified: true
- id: ITCL-05
  module: X-CLOUD
  check: 신규 이용계약 등 보고 사유 발생일부터 3개월 이내 감독원장 보고에 필요한 자료·통지 협조 조항이 있는가
  label: 감독원장 보고 협조
  severity: 필수
  severity_basis: 근거 조문이 강행규정(의무)임 — 전자금융감독규정 제14조의2
  norm_type: 강행
  basis: statute
  triggers:
    keywords:
    - 보고
    - 금융감독원
    - 클라우드
    - 3개월
  absence_check: true
  sources:
  - law: 전자금융감독규정
    article: 제14조의2
    clause: 제4항
    quote: 다음 각 호의 어느 하나에 해당하는 사유가 발생한 날로부터 3개월 이내에 금융감독원장에게 보고하여야 하고, 관련 서류를 최신상태로 유지하여야 한다
    verified: true
- id: ITCL-06
  module: X-CLOUD
  check: 제공자의 합병·분할·계약상 지위 양도·재위탁 등 중대한 변경사항 발생 시 사전 통지 조항이 있는가
  label: 중대변경 사전통지
  severity: 필수
  severity_basis: 근거 조문이 강행규정(의무)임 — 전자금융감독규정 제14조의2
  norm_type: 강행
  basis: statute
  triggers:
    keywords:
    - 합병
    - 분할
    - 양도
    - 재위탁
    - 중대한 변경
  absence_check: true
  sources:
  - law: 전자금융감독규정
    article: 제14조의2
    clause: 제4항 제2호
    quote: 클라우드컴퓨팅서비스 제공자의 합병, 분할, 계약상 지위의 양도, 재위탁 등 중대한 변경사항이 발생한 경우
    verified: true
  note: 법령상 의무는 발생일부터 3개월 내 사후 보고(제14조의2④)이며 계약상 사전 통지는 가중 약정임
- id: ITCL-07
  module: X-CLOUD
  check: 고유식별정보·개인신용정보를 클라우드로 처리하는 경우 해당 정보처리시스템의 국내 설치(국내 리전)가 계약상 보장되는가
  label: 국내 리전 설치 보장
  severity: 필수
  severity_basis: 근거 조문이 강행규정(의무)임 — 전자금융감독규정 제14조의2
  norm_type: 강행
  basis: statute
  triggers:
    keywords:
    - 국내
    - 국외
    - 리전
    - 고유식별정보
  absence_check: true
  absence_precondition:
  - 고유식별정보
  - 개인신용정보
  - 신용정보
  - 주민등록번호
  - 여권번호
  - 운전면허
  - 외국인등록번호
  sources:
  - law: 전자금융감독규정
    article: 제14조의2
    clause: 제7항 단서
    quote: 고유식별정보 또는 개인신용정보를 클라우드컴퓨팅서비스를 통하여 처리하는 경우에는 제11조제2호를 적용하고, 해당 정보처리시스템을 국내에 설치하여야 한다
    verified: true
