# =============================================================================
# C4-a 리스크 관점 재검수 — procurement.yaml(28) · outsourcing.yaml(19)
# 관점: 회사(미래에셋생명)가 계약 당사자로서 지는 리스크 기준 severity 재조정
#   - 회사의 통상 지위: procurement = 발주자/원사업자(매수인·도급인),
#                       outsourcing = 위탁자(원위탁 금융회사)
#   - 핵심 질문: 이 항목이 잘못되면 "우리 회사가" 다치는가(제재·배상·담보실효·무한책임)?
#
# ⚠️ 스키마 상호작용 주의(schema.md "심각도 도출 규칙"):
#   현행 severity는 derive_severity(norm_type, basis)로 규범효력에서 도출됨.
#   RISK 관점 severity가 그 도출값과 달라지면 validate.py가 경고를 출력하므로,
#   그런 항목은 severity_override: true + note 사유가 필요함.
#   아래 각 상향/하향 항목에 override_needed 플래그로 표시함(적용 단계에서 반영).
# =============================================================================

