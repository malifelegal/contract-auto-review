module:
  id: X-PII
  name: 개인(신용)정보 처리·제공
  always_on: false
  activation: confirm   # 기존 ② 결정 유지 — 강신호(특이어 2+ 또는 반복 3회+)만 자동 활성, 약신호는 질문으로 사람 확인
  screening_question: 이 계약에서 개인정보·개인신용정보를 제공·처리·위탁하는가?
  suggest_keywords: [개인정보, 신용정보, 고객정보, 정보주체, 개인신용정보]

# ── 통합 원칙 ──
#   • 처리위탁(개보법 §26·시행령 §28·신정법 §17) 논점은 outsourcing M-PRIV(PRIV-01~21) 벌이 최다·최신 → canonical.
#   • it-outsourcing M-PRIV(ITPV-01~10)·nda M-PII(NDA-PII-01~02)는 PRIV-*의 부분집합 → 삭제(deletions 참조).
#   • 제3자 제공(개보법 §17·§18)은 처리'위탁'(§26)과 법적으로 구별되는 별개 규율 → alliance M-PII의 ALL-PII-01~03을
#     독립 check로 보존(뭉개지 않음). NDA-PII-03(§26① 문서요건, NDA 병행검토 note)도 PRIV-01과 activation·note 관점이
#     달라 독립 보존.
#   • 모든 필드는 원본에서 온전 이전. quote·verified 무변경.

checks:
  # ══ 처리위탁: 개인정보 보호법 제26조 (canonical = outsourcing PRIV-*) ══
  - id: PRIV-01
    module: X-PII
    check: 개인정보 처리 업무 위탁이 법정 사항을 포함한 문서(계약서 본문 또는 처리위탁 특약)로 되어 있는가
    label: "개인정보 위탁 문서화"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 제26조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [개인정보, 처리위탁, 개인정보 처리, 특약]
    absence_check: true
    sources:
      - law: 개인정보 보호법
        article: 제26조
        clause: 제1항
        quote: '개인정보처리자가 제3자에게 개인정보의 처리 업무를 위탁하는 경우에는 다음 각 호의 내용이 포함된 문서로 하여야 한다'
        verified: true
  - id: PRIV-02
    module: X-PII
    check: 위탁 문서에 위탁업무 수행 목적 외 개인정보의 처리 금지에 관한 사항이 포함되어 있는가
    label: "목적 외 처리 금지"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 제26조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [목적 외, 목적외, 처리 금지]
    absence_check: true
    sources:
      - law: 개인정보 보호법
        article: 제26조
        clause: 제1항 제1호
        quote: '위탁업무 수행 목적 외 개인정보의 처리 금지에 관한 사항'
        verified: true
  - id: PRIV-03
    module: X-PII
    check: 위탁 문서에 개인정보의 기술적·관리적 보호조치에 관한 사항이 포함되어 있는가
    label: "기술적·관리적 보호조치"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 제26조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [기술적, 관리적, 보호조치, 안전성 확보]
    absence_check: true
    sources:
      - law: 개인정보 보호법
        article: 제26조
        clause: 제1항 제2호
        quote: '개인정보의 기술적ㆍ관리적 보호조치에 관한 사항'
        verified: true
  - id: PRIV-04
    module: X-PII
    check: 위탁 문서에 위탁업무의 목적 및 범위가 기재되어 있는가
    label: "위탁 목적·범위 기재"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 시행령 제28조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [위탁업무의 목적, 위탁업무의 범위, 처리 목적]
    absence_check: true
    sources:
      - law: 개인정보 보호법 시행령
        article: 제28조
        clause: 제1항 제1호
        quote: '위탁업무의 목적 및 범위'
        verified: true
  - id: PRIV-05
    module: X-PII
    check: 위탁 문서에 재위탁 제한에 관한 사항이 포함되어 있는가
    label: "재위탁 제한 명시"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 시행령 제28조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [재위탁, 재위탁 제한, 다시 위탁]
    absence_check: true
    sources:
      - law: 개인정보 보호법 시행령
        article: 제28조
        clause: 제1항 제2호
        quote: '재위탁 제한에 관한 사항'
        verified: true
  - id: PRIV-06
    module: X-PII
    check: 위탁 문서에 개인정보에 대한 접근 제한 등 안전성 확보 조치에 관한 사항이 포함되어 있는가
    label: "접근 제한 안전성 조치"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 시행령 제28조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [접근 제한, 접근권한, 접근통제, 안전성 확보]
    absence_check: true
    sources:
      - law: 개인정보 보호법 시행령
        article: 제28조
        clause: 제1항 제3호
        quote: '개인정보에 대한 접근 제한 등 안전성 확보 조치에 관한 사항'
        verified: true
  - id: PRIV-07
    module: X-PII
    check: 위탁 문서에 개인정보 관리 현황 점검 등 감독에 관한 사항이 포함되어 있는가
    label: "개인정보 관리 감독"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 시행령 제28조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [현황 점검, 감독, 점검, 관리 현황]
    absence_check: true
    sources:
      - law: 개인정보 보호법 시행령
        article: 제28조
        clause: 제1항 제4호
        quote: '위탁업무와 관련하여 보유하고 있는 개인정보의 관리 현황 점검 등 감독에 관한 사항'
        verified: true
  - id: PRIV-08
    module: X-PII
    check: 위탁 문서에 수탁자의 의무 위반 시 손해배상 등 책임에 관한 사항이 포함되어 있는가
    label: "위반 시 손해배상 책임"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 시행령 제28조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [손해배상, 배상, 의무 위반, 책임]
    absence_check: true
    sources:
      - law: 개인정보 보호법 시행령
        article: 제28조
        clause: 제1항 제5호
        quote: '법 제26조제2항에 따른 수탁자(이하 "수탁자"라 한다)가 준수하여야 할 의무를 위반한 경우의 손해배상 등 책임에 관한 사항'
        verified: true
  - id: PRIV-09
    module: X-PII
    check: 위탁하는 업무의 내용과 수탁자가 정보주체에게 공개되도록 조치(홈페이지 공개 목록 반영 등)되어 있는가
    label: "위탁 내용·수탁자 공개"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 제26조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [공개, 홈페이지, 게재]
    absence_check: false
    sources:
      - law: 개인정보 보호법
        article: 제26조
        clause: 제2항
        quote: '정보주체가 언제든지 쉽게 확인할 수 있도록 대통령령으로 정하는 방법에 따라 공개하여야 한다'
        verified: true
  - id: PRIV-10
    module: X-PII
    check: 공개 방법이 위탁자의 인터넷 홈페이지 지속 게재 방식으로 이행되는가
    label: "홈페이지 지속 게재"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 시행령 제28조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [홈페이지, 지속적으로 게재, 인터넷]
    absence_check: false
    sources:
      - law: 개인정보 보호법 시행령
        article: 제28조
        clause: 제2항
        quote: '위탁자의 인터넷 홈페이지에 위탁하는 업무의 내용과 수탁자를 지속적으로 게재하는 방법'
        verified: true
  - id: PRIV-11
    module: X-PII
    check: 홈페이지 게재가 불가능한 경우 사업장 게시·간행물 게재 등 대체 공개 방법이 이행되는가
    label: "대체 공개 방법"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 시행령 제28조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [게시, 간행물, 신문, 사업장]
    absence_check: false
    sources:
      - law: 개인정보 보호법 시행령
        article: 제28조
        clause: 제3항
        quote: '인터넷 홈페이지에 게재할 수 없는 경우에는 다음 각 호의 어느 하나 이상의 방법으로 위탁하는 업무의 내용과 수탁자를 공개하여야 한다'
        verified: true
  - id: PRIV-12
    module: X-PII
    check: 재화·서비스의 홍보 또는 판매 권유 업무 위탁이라면 위탁 업무 내용과 수탁자를 정보주체에게 서면등으로 알리는 절차가 있는가
    label: "홍보·판매 위탁 통지"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 제26조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [홍보, 판매 권유, 마케팅, 텔레마케팅]
    absence_check: false
    sources:
      - law: 개인정보 보호법
        article: 제26조
        clause: 제3항
        quote: '위탁자가 재화 또는 서비스를 홍보하거나 판매를 권유하는 업무를 위탁하는 경우에는 대통령령으로 정하는 방법에 따라 위탁하는 업무의 내용과 수탁자를 정보주체에게 알려야 한다'
        verified: true
      - law: 개인정보 보호법 시행령
        article: 제28조
        clause: 제4항
        quote: '법 제26조제3항 전단에서 "대통령령으로 정하는 방법"이란 서면등의 방법을 말한다'
        verified: true
  - id: PRIV-13
    module: X-PII
    check: 위탁자의 수탁자 교육 실시와 처리 현황 점검 등 감독 수인 의무 조항이 있는가
    label: "수탁자 교육·점검 감독"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 제26조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [교육, 감독, 점검, 실태점검]
    absence_check: true
    sources:
      - law: 개인정보 보호법
        article: 제26조
        clause: 제4항
        quote: '수탁자를 교육하고, 처리 현황 점검 등 대통령령으로 정하는 바에 따라 수탁자가 개인정보를 안전하게 처리하는지를 감독하여야 한다'
        verified: true
      - law: 개인정보 보호법 시행령
        article: 제28조
        clause: 제6항
        quote: '위탁자는 수탁자가 개인정보 처리 업무를 수행하는 경우에 법 또는 이 영에 따라 개인정보처리자가 준수하여야 할 사항과 법 제26조제1항 각 호의 사항을 준수하는지를 같은 조 제4항에 따라 감독하여야 한다'
        verified: true
  - id: PRIV-14
    module: X-PII
    check: 수탁자의 위탁받은 업무 범위 초과 이용·제3자 제공 금지 조항이 있는가
    label: "범위초과 이용·제공 금지"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 제26조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [범위를 초과, 제3자 제공, 제3자에게 제공, 목적 외]
    absence_check: true
    sources:
      - law: 개인정보 보호법
        article: 제26조
        clause: 제5항
        quote: '수탁자는 개인정보처리자로부터 위탁받은 해당 업무 범위를 초과하여 개인정보를 이용하거나 제3자에게 제공하여서는 아니 된다'
        verified: true
    note: NDA·제휴 계약에서도 개인정보가 비밀정보로 수반되면 본 항이 병행 적용됨(구 NDA-PII-01 논점 흡수)
  - id: PRIV-15
    module: X-PII
    check: 수탁자가 개인정보 처리 업무를 재위탁하는 경우 위탁자의 동의를 받도록 하는 조항이 있는가
    label: "개인정보 재위탁 동의"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 제26조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [재위탁, 다시 위탁, 동의]
    absence_check: true
    sources:
      - law: 개인정보 보호법
        article: 제26조
        clause: 제6항
        quote: '수탁자는 위탁받은 개인정보의 처리 업무를 제3자에게 다시 위탁하려는 경우에는 위탁자의 동의를 받아야 한다'
        verified: true
    note: 2023. 3. 14. 신설 조항. NDA·제휴에서 개인정보 재위탁 시에도 병행 적용됨(구 NDA-PII-02 논점 흡수)
  - id: PRIV-16
    module: X-PII
    check: 수탁자가 위탁받은 업무 관련 개인정보 처리 과정에서 법 위반으로 발생시킨 손해배상책임에 대하여 수탁자를 개인정보처리자의 소속 직원으로 간주하는 규정이 반영되어 있는가
    label: "수탁자 소속직원 간주"
    severity: 참고
    severity_basis: "간주규정임 — 개인정보 보호법 제26조"
    norm_type: 간주
    basis: statute
    triggers:
      keywords: [구상, 손해배상, 소속 직원]
    absence_check: true
    sources:
      - law: 개인정보 보호법
        article: 제26조
        clause: 제7항
