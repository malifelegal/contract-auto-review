# 회귀 케이스: §60 과다등장 (2026-07-12 실사용 피드백)
# 일반 콜센터 위탁 — 전자금융 무관이므로 §60 계열(M-IT, IT-*) 부재알람이 떠선 안 됨.
id: callcenter-outsourcing
desc: 일반 콜센터 업무위탁 — §60(IT-*) 오탐 금지
detect_expected: outsourcing
consider_must_exclude_prefix: [IT-, ALL-PII-]
# 신용정보 특칙(신정법)·제3자 제공(§17·§18)은 처리위탁 전용 계약에서 부재알람 금지 (Phase C2 X-PII 통합 회귀)
consider_must_exclude: [PRIV-17, PRIV-19, PRIV-20, PRIV-21]
text: |
  업무위탁계약서

  제1조(목적) 갑은 을에게 보험 상담 콜센터 업무를 위탁하고 을은 이를 수탁하여 수행한다.
  제2조(위탁업무의 범위) 위탁업무는 고객 인바운드 상담, 민원 접수, 아웃바운드 안내로 한다.
  제3조(재위탁 금지) 을은 갑의 사전 서면 동의 없이 위탁업무의 전부 또는 일부를 제3자에게 재위탁할 수 없다.
  제4조(개인정보 보호) 을은 개인정보 보호법에 따라 위탁업무 수행 중 알게 된 고객의 개인정보를 처리하며, 처리위탁 내용을 문서로 정한다.
  제5조(수수료) 갑은 을에게 월 상담 건수에 따라 위탁수수료를 지급한다.
  제6조(계약기간) 본 계약의 기간은 계약 체결일로부터 1년으로 한다.
