# X-ASSET — 보험업 자산운용 규제 횡단모듈 스테이징 (통합)
# finance.yaml M-ASSET(FIN-ASSET-01~04) + investment.yaml M-SPECIAL(INV-SP-01, 특별계정 구분회계) → 보험업법 자산운용 규제 1벌.
# INV-SP-01은 보험업법 제108조(특별계정 구분회계) 근거로 보험업 자산운용 규제군에 속함 → X-ASSET로 통합(canonical=INV-SP-01).
# activation 근거: 원 M-ASSET screening='보험회사가 대주로서 자기자산을 운용하는 여신인가',
#   suggest([보험회사, 신용공여, 자산운용, 대주주]) + M-SPECIAL suggest([변액, 특별계정, 퇴직연금]) 모두 보험업 특이어 →
#   기본(1개) 활성 제안. 다만 '자산운용'은 타 문맥 등장 가능성 있어 strong도 무방하나, 나머지가 강특이어라 기본 유지.
module:
  id: X-ASSET
  name: 보험업 자산운용 규제
  always_on: false
  activation: default
  screening_question: 보험회사가 자기자산(일반계정·특별계정)을 운용하는 여신·투자·특별계정 운용인가?
  # M-ASSET([보험회사, 신용공여, 자산운용, 대주주]) + M-SPECIAL([변액, 특별계정, 퇴직연금]) 합집합에서 범용어 제거.
  suggest_keywords: [보험회사, 신용공여, 자산운용, 대주주, 특별계정, 변액, 퇴직연금]

checks:
  - id: FIN-ASSET-01
    check: 여신(신용공여)이 보험업법 자산운용 원칙(안정성·유동성·수익성·공익성)에 부합하는가
    label: "자산운용 원칙 부합"
    module: X-ASSET
    severity: 필수
    severity_basis: 강행규정 — 보험업법 제104조(자산운용 원칙·선관주의)
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [자산운용, 신용공여, 선량한 관리자]
    absence_check: false
    sources:
      - law: 보험업법
        article: 제104조
        clause: ""
        quote: 보험회사는 그 자산을 운용할 때 안정성ㆍ유동성ㆍ수익성 및 공익성이 확보되도록 하여야 한다
        verified: true
        source_type: law
  - id: FIN-ASSET-02
    check: 금지되는 자산운용(투기목적 대출·자기주식 취득 목적 대출·임직원 대출 등)에 해당하지 않는가
    label: "금지 자산운용 비해당"
    module: X-ASSET
    severity: 필수
    severity_basis: 강행규정(금지) — 보험업법 제105조(금지되는 자산운용)
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [투기, 자기주식, 임직원 대출, 정치자금]
    absence_check: false
    sources:
      - law: 보험업법
        article: 제105조
        clause: ""
        quote: 상품이나 유가증권에 대한 투기를 목적으로 하는 자금의 대출
        verified: true
        source_type: law
  - id: FIN-ASSET-03
    check: 대주주·동일차주 신용공여가 자산운용 한도(보험업법 제106조)를 초과하지 않는가
    label: "대주주 신용공여 한도"
    module: X-ASSET
    severity: 필수
    severity_basis: 강행규정(한도) — 보험업법 제106조(신용공여 비율 한도)
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [신용공여, 동일차주, 한도, 대주주]
    absence_check: false
    sources:
      - law: 보험업법
        article: 제106조
        clause: 제1항
        quote: "동일차주에 대한 신용공여 또는 그 동일차주가 발행한 채권 및 주식 소유의 합계액 가. 일반계정: 총자산의 100분의 12"
        verified: true
        source_type: law
  - id: FIN-ASSET-04
    check: 대주주에 대한 신용공여 시 이사회 의결·공시 등 절차를 준수하는가
    label: "대주주 신용공여 절차"
    module: X-ASSET
    severity: 필수
    severity_basis: 강행규정 — 보험업법 제111조(대주주 거래제한, 이사회 의결·보고·공시)
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [대주주, 신용공여, 이사회, 공시]
    absence_check: false
    sources:
      - law: 보험업법
        article: 제111조
        clause: 제2항
        quote: 대통령령으로 정하는 금액 이상의 신용공여를 하거나 그 보험회사의 대주주가 발행한 채권 또는 주식을 대통령령으로 정하는 금액 이상으로 취득하려는 경우에는 미리 이사회의 의결을 거쳐야 한다
        verified: true
        source_type: law
  - id: INV-SP-01
    check: 변액보험 등 특별계정 자산의 투자인 경우 특별계정 구분·구분회계가 전제되어 있는가
    label: "특별계정 구분회계"
    module: X-ASSET
    severity: 필수
    severity_basis: 강행규정 — 보험업법 제108조(특별계정 자산 구분 회계처리)
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [특별계정, 변액, 구분 회계, 준비금]
    absence_check: false
    sources:
      - law: 보험업법
        article: 제108조
        clause: 제2항
        quote: 특별계정에 속하는 자산은 다른 특별계정에 속하는 자산 및 그 밖의 자산과 구분하여 회계처리하여야 한다
        verified: true
        source_type: law

deletions:
  - file: types/investment.yaml
    id: INV-SP-01
    reason: 보험업법 제108조 특별계정 구분회계로 보험업 자산운용 규제군에 속함 → X-ASSET로 통합. M-SPECIAL 모듈은 INV-SP-01 단일 check이므로 모듈째 이관(investment.yaml에서 M-SPECIAL 모듈 정의도 제거 대상 — 검수 시 확인).
    canonical: INV-SP-01
    refs: 없음 (tests/·docs/ 내 INV-SP-01 id 참조 없음)
