# 공개 표준계약서 케이스(실전형): 표준투자일임계약서(금투협 형식 준거).
# 출처: 출처: 투자일임계약서 (㈜마이퍼스트에셋자산운용 — 금융투자협회 표준투자일임계약서 형식 준거) | https://seoulassetmgmt.com/file_download/?id=6749&file=1 | 원문(PDF 전문 텍스트 추출)
# 고정: investment 감지 + M-MANDATE(일임) 활성. FIN-SEC-02 알람은 본문에 질권 언급이
# 실재해 약한 게이트의 설계된 트레이드오프 — 배제 assertion 걸지 않음(검토자 해당없음→코퍼스 경로).
id: std-discretionary
desc: 표준투자일임계약서 — investment 감지·M-MANDATE 활성
detect_expected: investment
active_must_include: [M-MANDATE]
text: |
  제1조 (목적)
  회사는 고객의 투자일임재산에 대해 투자일임서비스를 제공하고, 고객은 회사의 투자일임서비스에 대해 투자일임수수료를 지급하는 데 필요한 사항을 정하는 것을 목적으로 한다.

  제2조 (계약의 내용)
  고객과 회사가 합의한 본 계약의 세부계약조건 내용은 [별지]에 따른다.

  제3조 (투자대상)
  회사가 고객의 투자일임재산을 운용함에 있어 그 투자대상은 다음 각 호에 해당하는 금융투자상품으로 한다.
  1. 자본시장과 금융투자업에 관한 법률 제4조에 규정된 증권
  2. 자본시장과 금융투자업에 관한 법률 제5조에 규정된 파생상품
  3. 그 밖의 고객과 회사가 사전 합의한 금융투자상품

  제4조 (투자일임의 범위)
  고객은 회사에게 다음 각 호의 사항을 일임하고 회사는 고객을 위하여 투자를 행한다.
  1. 투자일임재산의 투자전략 수립 및 자산배분에 관한 사항
  2. 투자일임재산의 포트폴리오 구성 및 분석에 관한 사항
  3. 투자상품의 가치판단에 대한 사항
  4. 투자대상의 종류, 종목, 수량, 가격에 대한 사항
  5. 투자대상의 매매의 구분, 방법 및 시기에 대한 사항
  6. 그 밖의 제1호 내지 제5호와 관련된 부수업무

  제5조 (투자일임서비스의 내용)
  회사가 고객에게 제공하는 투자일임서비스의 내용은 다음 각 호와 같다.
  1. 계약에 따른 투자일임재산의 운용
  2. 투자일임재산의 운용결과에 대한 보고
  3. 투자일임재산의 운용전략에 대한 보고
  4. 그 밖의 투자일임재산 운용과 관련하여 필요한 사항

  제6조 (투자일임수수료)
  1. 고객은 회사가 제공하는 투자일임서비스의 대가로서 [별지] 세부계약조건에서 정하는 기본수수료와 성과수수료를 회사에게 지급한다.
  2. 기본수수료는 투자일임재산 계약금액을 기준으로 [별지] 세부계약조건의 기본수수료율을 적용하여 연 1회 선취로 징수하는 수수료로 계약일로부터 7일 이내에 회사가 지정한 계좌로 이체하여 지급한다. 회사는 기본수수료의 입금 여부를 확인한 이후에 운용을 개시하는 것을 원칙으로 한다.
  3. 성과수수료는 고객과 합의에 따라 징수하는 수수료로 계약만기일 또는 중도해지일로부터 7일 이내에 회사가 지정한 계좌로 이체하여 지급한다.
  4. 회사는 고객의 중도해지 시 [별지] 세부계약조건에서 정한 바에 따라 선취수수료를 고객에게 일할 반환하여야 한다.

  제7조 (회사의 신의성실 의무)
  회사는 고객에게 투자일임서비스를 제공함에 있어 선량한 관리자로서 신의에 따라 성실하게 그 의무를 이행하여야 한다.

  제8조 (고객의 의사 등 사전파악)
  ① 회사는 고객에게 투자일임서비스를 제공함에 있어 고객의 투자목적, 투자경험, 투자대상자산, 위험선호정도, 투자예정기간 등을 사전에 서면으로 파악함으로써 고객의 의사를 투자일임재산 운용에 최대한 반영하여야 한다.
  ② 회사는 매분기 1회 이상 고객의 투자목적 등의 변경여부를 확인하고, 변경된 내용에 부합하도록 투자일임재산을 운용하여야 한다.
  ③ 고객은 자기의 재무상태, 투자목적 등에 대하여 투자일임재산을 운용하는 회사의 임직원에게 상담을 요청할 수 있으며, 투자일임재산을 운용하는 회사의 임직원은 그 요청에 성실하게 응하여야 한다.

  제9조 (운용계획서 및 투자일임보고서 교부)
  ① 계약기간 동안 회사는 고객에게 분기1회 이상 투자일임재산에 대한 투자일임보고서를 직접 또는 우편발송 등의 방법으로 서면 제출하고 설명해야 한다. 단, 고객이 전자우편을 통하여 투자일임보고서를 받는다는 의사표시를 하는 경우에는 전자우편으로 보낼 수 있다.
  ② 제1항의 투자일임보고서에는 다음의 사항을 기재하여야 한다.
   1. 운용경과의 개요 및 손익현황
   2. 투자일임재산의 매매일자, 매매가격, 위탁수수료 및 제세금 등 운용현황
   3. 투자일임재산에 속하는 자산의 종류별 잔액현황, 취득가액, 시가 및 평가 손익
   4. 투자일임수수료를 부과하는 경우에는 그 시기 및 금액
   5. 투자일임재산을 실제로 운용한 투자운용인력에 관한 사항
   6. 성과보수에 관한 약정이 있는 경우 기준지표의 성과와 성과보수 지급내역 등
   7. 투자일임재산 중 특정자산을 회사의 고유재산과 거래한 실적 (시기, 실적, 잔액)
   8. 그 밖의 관계법령상 투자자보호를 위하여 필요한 사항

  제13조 (운용결과의 귀속)
  회사가 투자일임재산을 운용한 결과 발생하는 이익과 손실은 고객에게 귀속된다.

  제14조 (회사의 금지사항)
  회사는 다음 각 호에 해당하는 행위를 해서는 안 된다.
  1. 고객으로부터 금전·증권, 그 밖의 재산의 보관·예탁을 받는 행위
  2. 고객에게 금전·증권, 그 밖의 재산을 대여하거나 고객에 대한 제3자의 금전·증권, 그 밖의 재산의 대여를 중개·주선 또는 대리하는 행위
  3. 투자운용인력이 아닌 자에게 투자일임업을 수행하게 하는 행위
  4. 계약으로 정한 수수료 외의 대가를 추가로 받는 행위
  9. 특정고객의 이익을 해하면서 자기 또는 제3자의 이익을 도모하는 행위
  15. 투자일임계약을 위반하여 투자일임재산을 운용하는 행위
  16. 투자일임의 범위, 투자목적 등을 고려하지 아니하고 투자일임재산으로 금융투자상품을 지나치게 자주 매매하는 행위
  19. 투자일임재산의 운용내역 및 자산의 평가내역에 대한 고객의 조회를 거부하거나 방해하는 행위

  제15조 (면책)
  회사는 다음 각 호의 어느 하나에 해당하는 사유로 인하여 고객에게 손해가 발생하는 경우 회사의 책임 있는 사유가 없는 한 책임을 지지 않는다.
  1. 천재지변, 전시·사변 또는 이에 준하는 불가항력이라고 인정되는 사유에 의한 계약이행의 불능 또는 지연
  2. 서류 및 인감(또는 서명감) 등을 상당한 주의로 대조하고 틀림이 없다고 인정하여 업무처리 하였음에도 위조 도용 그 밖의 사고로 인하여 발생한 손해

  제16조 (계약의 유효기간)
  ① 투자일임계약의 유효기간은 [별지]에서 정한 계약기간으로 한다.
  ② 회사는 계약만료일 1개월 전까지 고객에게 계약만료일을 통지하여야 하며, 계약기간을 연장하고자 하는 경우 "고객은 계약 만료일 이전까지 계약해지의 의사표시를 할 수 있으며 계약해지의 의사를 표시하지 아니한 경우에는 동일한 조건 및 동일한 기간으로 계약이 갱신된 것으로 본다"는 내용을 통지하여야 한다.
  ③ 고객이 제2항의 통지를 받은 날로부터 계약만료일까지 계약해지의 의사표시를 하지 아니한 경우에는 종전 계약과 동일한 기간 및 동일한 조건으로 계약이 갱신된 것으로 본다. 단, 계약금액 및 계약기간은 당사자간의 합의에 따라 변동될 수 있다.

  제17조 (계약의 변경 및 해지)
  ① 고객은 전화 또는 서면 등 회사와 사전에 합의한 방법으로 계약을 변경하거나 해지할 수 있다.
  ② 회사는 다음 각 호의 어느 하나에 해당하는 사유가 발생한 경우 고객에게 14일 이상의 기간을 부여하여 시정조치를 요구하고, 고객이 적절한 조치를 취하지 아니한 때에는 계약을 해지할 수 있다. 단, 고객의 계약 위반내용의 시정이 명백히 불가능하거나 계약 위반의 정도가 중하여 계약목적을 달성할 수 없는 정도에 이른 때에는 즉시 계약을 해지할 수 있다.
   1. 고객의 계좌에 가압류나 압류절차가 시작되거나 질권이 설정되어 투자일임재산의 운용에 제한이 있는 경우
   2. 고객이 재무상태, 투자목적 등이 변경되었음에도 불구하고 4회(계약한 연도에는 3회)이상 재무상태, 투자 목적 등의 변경여부에 대하여 회신하지 않는 경우
