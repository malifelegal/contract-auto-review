module:
  id: X-RELATED
  name: 대주주·계열사 거래제한
  always_on: false
  # activation 제안: 자사(미래에셋생명)가 계약당사자인 것은 모든 계약에 공통이므로
  # '미래에셋' 단독 어휘로는 활성화하지 않음. 상대방이 계열사·대주주·특수관계인이라는
  # 신호(계열사 어휘 + 특수관계 표지 + 그룹 브랜드 사용)가 잡힐 때만 활성화하는 게 적정.
  # 근거: 보험업법 §111·§116은 '대주주'·'자회사'와의 거래에만 적용되므로, 일반 제3자
  # 상거래에는 규범이 발동하지 않음. 오활성 시 무관 계약에 필수 경고가 뜨는 문제가 큼.
  activation: screening   # 항상활성(always_on) 아님 — 스크리닝질문 + suggest_keywords 검출 시 활성화 제안
  screening_question: 계약 상대방이 미래에셋 계열사·대주주·특수관계인이거나, 브랜드(상표) 사용료·그룹 내부거래가 포함되는가?
  suggest_keywords:
    # 상대방이 계열사/특수관계인이라는 '신호'를 잡는 어휘군.
    # '미래에셋' 단독은 자사명이라 부적합 → 계열·특수관계 표지어와 그룹거래 어휘 위주.
    - 계열사
    - 계열회사
    - 대주주
    - 특수관계
    - 특수관계인
    - 관계회사
    - 상표 사용
    - 상표사용료
    - 브랜드 수수료
    - 브랜드사용료
    - 그룹
    - 내부거래
    - 신용공여
checks:
  - id: REL-01
    check: 계약 상대방이 보험회사의 대주주(그 특수관계인 포함)인 경우, 자산 무상양도 또는 뚜렷하게 불리한 조건의 매매·교환·신용공여·재보험거래에 해당하지 않는가
    label: "대주주 불리조건거래 금지"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(금지)임 — 보험업법 제111조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [대주주, 특수관계인, 무상 양도, 무상양도, 불리한 조건, 신용공여, 재보험]
    absence_check: false
    sources:
      - law: 보험업법
        article: 제111조
        clause: 제1항 제2호
        quote: '자산을 대통령령으로 정하는 바에 따라 무상으로 양도하거나 일반적인 거래 조건에 비추어 해당 보험회사에 뚜렷하게 불리한 조건으로 자산에 대하여 매매ㆍ교환ㆍ신용공여 또는 재보험계약을 하는 행위'
        verified: true
        source_type: law
    note: "보험업법 §111①은 보험회사가 직접·간접으로 대주주와 '하여서는 아니 된다'는 강행 금지규정. 위반 시 §196 과징금(신용공여액·자산장부가액 이하)·§200 벌칙 병과 가능(§111② 이사회 미의결·§111③④ 미보고·미공시는 §209 과태료). '뚜렷하게 불리한 조건' 판정을 위해 정상가격 대비 비교근거 확보 필요."
  - id: REL-02
    check: 대주주에 대한 일정금액 이상 신용공여 또는 대주주 발행 채권·주식의 일정금액 이상 취득에 대해 사전 이사회 의결(재적이사 전원 찬성)을 거치도록 하였는가
    label: "대주주거래 이사회 전원의결"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 보험업법 제111조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [대주주, 신용공여, 이사회 의결, 이사회의 의결, 채권 취득, 주식 취득]
    absence_check: true
    sources:
      - law: 보험업법
        article: 제111조
        clause: 제2항
        quote: '보험회사는 그 보험회사의 대주주에 대하여 대통령령으로 정하는 금액 이상의 신용공여를 하거나 그 보험회사의 대주주가 발행한 채권 또는 주식을 대통령령으로 정하는 금액 이상으로 취득하려는 경우에는 미리 이사회의 의결을 거쳐야 한다. 이 경우 이사회는 재적이사 전원의 찬성으로 의결하여야 한다'
        verified: true
        source_type: law
    note: "'미리 이사회의 의결을 거쳐야 한다'·'재적이사 전원의 찬성' — 강행 의무. §111② 위반(이사회 미의결)은 §209 과태료 대상. 금액 기준은 시행령 위임(대통령령). 계약이 신용공여·증권취득 성격이면 사전 이사회 전원의결 절차 반영 확인."
  - id: REL-03
    check: 대주주와의 신용공여·증권취득 등 거래 시 금융위 보고(7일 이내)·공시 및 분기별 보고·공시 의무 이행 절차가 반영되어 있는가
    label: "대주주거래 보고·공시"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 보험업법 제111조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [대주주, 금융위원회, 보고, 공시, 분기별]
    absence_check: false
    sources:
      - law: 보험업법
        article: 제111조
        clause: 제3항
        quote: '보험회사는 그 보험회사의 대주주와 다음 각 호의 어느 하나에 해당하는 행위를 하였을 때에는 7일 이내에 그 사실을 금융위원회에 보고하고 인터넷 홈페이지 등을 이용하여 공시하여야 한다'
        verified: true
        source_type: law
    note: "§111③(7일 내 보고·공시)·§111④(분기별 보고·공시) 모두 '하여야 한다' 강행. §111③④ 미보고·거짓보고·미공시는 §209 과태료. 계약 자체 조항이 아니라 이행 절차 항목이므로 absence_check는 false(계약서에 명시 안 돼도 위법 아님) — 실무상 사후 절차 점검용."
  - id: REL-04
    check: 자회사와의 거래인 경우, 자산 무상양도·불리조건 매매·자회사 주식담보 신용공여·자회사 임직원 대출 등 §116 금지행위에 해당하지 않는가
    label: "자회사 금지행위 해당성"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(금지)임 — 보험업법 제116조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [자회사, 무상 양도, 무상양도, 불리한 조건, 주식 담보, 임직원 대출, 신용공여]
    absence_check: false
    sources:
      - law: 보험업법
        article: 제116조
        clause: 제1호
        quote: '자산을 대통령령으로 정하는 바에 따라 무상으로 양도하거나 일반적인 거래 조건에 비추어 해당 보험회사에 뚜렷하게 불리한 조건으로 매매ㆍ교환ㆍ신용공여 또는 재보험계약을 하는 행위'
        verified: true
        source_type: law
    note: "§116은 보험회사가 자회사와 '하여서는 아니 된다'는 강행 금지(제1호 불리조건거래·제2호 자회사주식담보/출자지원 신용공여·제3호 자회사 임직원 대출). 위반 시 §209 과태료. 계약 상대방이 자회사(§115 소유 자회사)이면 발동."
  - id: REL-05
    check: 계약 상대방 계열사의 임원이 우리 회사 이사·주요주주 등을 겸직하는 등 상법 §398 자기거래에 해당하는 경우, 사전 이사회 승인(이사 2/3 이상)과 거래 공정성 요건을 반영하였는가
    label: "이사 자기거래 이사회승인"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 상법 제398조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [이사, 주요주주, 겸직, 자기거래, 이사회 승인, 이사회의 승인, 특수관계]
    absence_check: false
    sources:
      - law: 상법
        article: 제398조
        quote: '다음 각 호의 어느 하나에 해당하는 자가 자기 또는 제3자의 계산으로 회사와 거래를 하기 위하여는 미리 이사회에서 해당 거래에 관한 중요사실을 밝히고 이사회의 승인을 받아야 한다. 이 경우 이사회의 승인은 이사 3분의 2 이상의 수로써 하여야 하고, 그 거래의 내용과 절차는 공정하여야 한다'
        verified: true
        source_type: law
    note: "§398은 이사·주요주주 및 그 특수관계 회사(발행주식 50% 이상 지배회사·자회사 포함, 제4호·제5호)가 회사와 거래 시 '미리 이사회 승인(이사 2/3 이상)'을 요구하는 강행규정. 계열사 거래에서 상대방이 우리 회사 이사·주요주주가 지배하는 회사이면 자기거래 규제 발동. 승인 없는 거래는 상대적 무효(선의 제3자 대항 불가), 이사 손해배상책임(§399)·책임감면 배제(§400②)."
  - id: REL-06
    check: 계열사 지원(가지급금·대여·인력·부동산·용역 등 상당히 유리한 조건 제공, 또는 실질역할 없는 회사 매개거래)에 해당하여 공정거래법상 부당지원 리스크가 없는가
    label: "부당지원행위 리스크"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(금지)임 — 독점규제 및 공정거래에 관한 법률 제45조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [계열사, 계열회사, 지원, 상당히 유리한 조건, 가지급금, 대여금, 인력 지원, 통행세]
    absence_check: false
    sources:
      - law: 독점규제 및 공정거래에 관한 법률
        article: 제45조
        clause: 제1항 제9호
        quote: '특수관계인 또는 다른 회사에 가지급금ㆍ대여금ㆍ인력ㆍ부동산ㆍ유가증권ㆍ상품ㆍ용역ㆍ무체재산권 등을 제공하거나 상당히 유리한 조건으로 거래하는 행위'
        verified: true
        source_type: law
    note: "§45①제9호(부당지원)는 '하여서는 아니 된다' 강행 금지. 나목은 실질역할 없는 계열사 매개거래(이른바 통행세). §50② 과징금(매출액 10% 이내)·§124 벌칙. 상표사용료·용역 단가가 정상가격 대비 상당히 유리·불리한지 비교근거로 판정. 위반 시 지원객체(§45②)도 수령 금지."
  - id: REL-07
    check: 공시대상기업집단 소속 회사가 동일인·친족(특수관계인) 지분 요건 계열회사와 상당히 유리한 조건 또는 비교없는 상당규모 거래로 특수관계인에게 부당이익을 귀속시키는 사익편취에 해당하지 않는가
    label: "사익편취(특수관계인 이익제공)"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(금지)임 — 독점규제 및 공정거래에 관한 법률 제47조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [공시대상기업집단, 특수관계인, 부당한 이익, 사익편취, 상당한 규모, 계열회사]
    absence_check: false
    sources:
      - law: 독점규제 및 공정거래에 관한 법률
        article: 제47조
        clause: 제1항
        quote: '공시대상기업집단(동일인이 자연인인 기업집단으로 한정한다)에 속하는 국내 회사는 특수관계인, 동일인이 단독으로 또는 다른 특수관계인과 합하여 발행주식총수의 100분의 20 이상의 주식을 소유한 국내 계열회사 또는 그 계열회사가 단독으로 발행주식총수의 100분의 50을 초과하는 주식을 소유한 국내 계열회사와 다음 각 호의 어느 하나에 해당하는 행위를 통하여 특수관계인에게 부당한 이익을 귀속시키는 행위를 하여서는 아니 된다'
        verified: true
        source_type: law
    note: "§47은 §45 부당지원과 별개 규율(사익편취) — 공시대상기업집단·동일인이 자연인인 경우에 한정. 미래에셋금융그룹의 기업집단 지정·동일인 요건 해당성 별도 확인 필요(그룹 지배구조 사실관계 의존). 상당규모 거래(제4호)는 §47②·시행령 예외(효율성·보안성·긴급성) 검토. §50② 과징금·§124 벌칙, 특수관계인 관여 지시 금지(§47④)."
  - id: REL-08
    check: 계열사·특수관계인 거래의 대가(상표사용료·용역단가 등)에 대해 정상가격 산정근거(비교견적·시장가·산정방식)가 계약서 또는 부속자료에 확보되어 있는가
    label: "정상가격 산정근거 확보"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [상표사용료, 브랜드 수수료, 정상가격, 비교견적, 산정 근거, 단가, 시장가]
    absence_check: true
    sources: []
    note: "§111·§116(불리조건)·§45제9호(상당히 유리)·§47(상당히 유리)의 위법성 판정이 모두 '정상거래조건 대비'로 이뤄지므로, 정상가격 비교근거 확보는 위 강행규정 방어의 실무 전제. 법령이 직접 계약서 기재를 강제하는 것은 아니라 basis=practice. 대규모내부거래는 공정거래법 §26 이사회 의결·공시 별도(공시대상기업집단 소속 시)."
