# 누락검출 유지 케이스 (게이트의 반대면 — 관련성 있으면 부재알람이 살아야 함)
# '질권을 설정할 수 있다'만 있고 제3채무자 통지·승낙(대항요건)이 없는 계약 —
# FIN-SEC-02 부재알람이 반드시 떠야 함(전제어휘 '질권' 충족).
id: pledge-missing-perfection
desc: 질권 설정 언급만 있는 대출계약 — 대항요건(FIN-SEC-02) 누락검출 유지
detect_expected: finance
consider_must_include: [FIN-SEC-02]
text: |
  대출 및 질권설정 계약서

  제1조(대출) 갑은 을에게 금 일억원을 대출한다.
  제2조(질권) 을은 대출채무의 담보로 을이 병 은행에 대하여 가지는 예금채권에 질권을 설정할 수 있다.
  제3조(이자) 이자는 연 5퍼센트로 한다.
  제4조(변제기) 대출 원리금의 변제기는 계약일로부터 1년으로 한다.
