# 억제 부작용 방지 케이스 (성격 게이트의 반대면)
# 진성 주주간계약 — '화해' 부수언급 1회(임계 미달)로는 shareholders가 억제되면 안 됨.
id: genuine-shareholders
desc: 진성 주주간계약(화해 1회 부수언급) — shareholders 정상 감지
detect_expected: shareholders
text: |
  주주간계약서

  제1조(주식양도의 제한) 주주는 상대방 주주의 사전 서면 동의 없이 보유 주식의 전부 또는 일부를 제3자에게 양도할 수 없다.
  제2조(우선매수권) 주식을 양도하고자 하는 주주는 상대방 주주에게 동일 조건의 우선매수권을 부여한다.
  제3조(의결권 공동행사) 주주는 이사 선임에 관한 주주총회 안건에 대하여 의결권을 공동으로 행사한다.
  제4조(분쟁해결) 본 계약에 관한 분쟁은 우선 당사자 간 화해로 해결하도록 노력한다.
