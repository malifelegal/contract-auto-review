# X-COMP — 공정거래 횡단모듈 스테이징 (통합)
# alliance.yaml M-COMP(ALL-COMP-01 부당공동행위·ALL-COMP-02 거래상지위남용) +
# shareholders.yaml M-ANTITRUST(SH-ANT-01 기업결합신고·SH-ANT-02 경쟁제한성) → 공정거래 1벌.
# 통합이지만 네 check 모두 서로 다른 조문·규범(제40·45·11·9조)이라 canonical 병합 없이 4개 온전 이전.
# SH-ANT-01의 tier: conditional 보존.
# activation 근거: suggest 합집합에 '거래조건'·'거래상'·'지분 취득' 등 범용어 포함 → 오활성 방지 strong(2개+) 제안.
module:
  id: X-COMP
  name: 공정거래(경쟁제한·거래상지위·기업결합)
  always_on: false
  activation: strong
  screening_question: 경쟁사업자 간 협력·공동 거래조건 설정, 거래상지위 남용, 또는 기업결합 신고대상 지분취득·임원겸임이 있는가?
  # M-COMP([공동, 경쟁, 가격, 거래조건, 거래상]) + M-ANTITRUST([기업결합, 경쟁제한, 공정거래위원회, 지분 취득, 임원겸임]) 합집합에서
  # 범용어(거래조건·지분 취득) 정제하고 공정거래 특이어 위주로.
  suggest_keywords: [부당한 공동행위, 경쟁제한, 거래상 지위, 기업결합, 공정거래위원회, 임원겸임]

checks:
  - id: ALL-COMP-01
    check: 경쟁사업자 간 협력이 가격·거래조건·거래상대방을 공동으로 정하는 부당한 공동행위에 해당하지 않는가
    label: "부당 공동행위"
    module: X-COMP
    severity: 필수
    severity_basis: 강행규정(금지) — 공정거래법 제40조 제1항(부당한 공동행위 금지, 합의 자체 무효)
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [공동, 가격, 거래조건, 거래상대방, 경쟁]
    absence_check: false
    sources:
      - law: 독점규제 및 공정거래에 관한 법률
        article: 제40조
        clause: 제1항
        quote: 다른 사업자와 공동으로 부당하게 경쟁을 제한하는 다음 각 호의 어느 하나에 해당하는 행위를 할 것을 합의
        verified: true
        source_type: law
      - law: 독점규제 및 공정거래에 관한 법률
        article: 제40조
        clause: 제4항
        quote: 부당한 공동행위를 할 것을 약정하는 계약 등은 해당 사업자 간에는 그 효력을 무효로 한다
        verified: true
        source_type: law
  - id: ALL-COMP-02
    check: 우월적 지위를 이용해 상대방에게 불리한 조건을 강제하거나 사업활동을 부당 구속하지 않는가
    label: "우월적 지위 남용"
    module: X-COMP
    severity: 권장
    severity_basis: 강행규정(금지)이나 부당성 판단 필요 — 공정거래법 제45조 제1항(불공정거래행위·거래상지위남용)
    norm_type: 강행
    severity_override: true
    basis: statute
    triggers:
      keywords: [거래상 지위, 구속, 불이익, 강제]
    absence_check: false
    sources:
      - law: 독점규제 및 공정거래에 관한 법률
        article: 제45조
        clause: 제1항 제6호
        quote: 자기의 거래상의 지위를 부당하게 이용하여 상대방과 거래하는 행위
        verified: true
        source_type: law
      - law: 독점규제 및 공정거래에 관한 법률
        article: 제45조
        clause: 제1항 제7호
        quote: 거래의 상대방의 사업활동을 부당하게 구속하는 조건으로 거래하는 행위
        verified: true
        source_type: law
  - id: SH-ANT-01
    module: X-COMP
    check: 지분취득·임원겸임 등이 기업결합 신고 대상 규모에 해당하는지 검토하고 신고 협조 조항이 있는가
    label: "기업결합 신고 협조"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 독점규제 및 공정거래에 관한 법률 제11조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [기업결합, 기업결합 신고, 공정거래위원회, 임원겸임]
    absence_check: true
    # 특수규제 tier: 기업결합 신고는 신고대상 규모(자산총액·매출액 기준 — 문언 외 사실)로 적용이 결정됨 → conditional(리포트 "적용 시 확인" 접힘).
    # precondition은 모듈(X-COMP) suggest_keywords와 중복이라 부여하지 않음.
    tier: conditional
    sources:
      - law: 독점규제 및 공정거래에 관한 법률
        article: 제11조
        clause: 제1항 제1호
        quote: '다른 회사의 발행주식총수(「상법」 제344조의3제1항 및 제369조제2항ㆍ제3항의 의결권 없는 주식의 수는 제외한다. 이하 이 장에서 같다)의 100분의 20[「자본시장과 금융투자업에 관한 법률」에 따른 주권상장법인(이하 "상장법인"이라 한다)의 경우에는 100분의 15를 말한다] 이상을 소유하게 되는 경우'
        verified: true
        source_type: law
      - law: 독점규제 및 공정거래에 관한 법률
        article: 제11조
        clause: 제1항
        quote: '대통령령으로 정하는 바에 따라 공정거래위원회에 신고하여야 한다'
        verified: true
        source_type: law
    note: 지분율 기준(20%, 상장법인 15%)은 법률 제11조 제1항 제1호 본문 — 자산총액·매출액 규모기준만 대통령령 위임
  - id: SH-ANT-02
    module: X-COMP
    check: 본 지분거래가 경쟁을 실질적으로 제한하는 기업결합에 해당하지 않음이 검토되었는가
    label: "경쟁제한성 검토"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 독점규제 및 공정거래에 관한 법률 제9조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [경쟁제한, 경쟁을 실질적으로, 기업결합 제한, 거래분야]
    absence_check: false
    sources:
      - law: 독점규제 및 공정거래에 관한 법률
        article: 제9조
        clause: 제1항
        quote: '일정한 거래분야에서 경쟁을 실질적으로 제한하는 행위를 하여서는 아니 된다'
        verified: true

# 통합이지만 4개 check가 서로 다른 조문 근거 → 삭제(중복 병합) 대상 없음.
# alliance.yaml M-COMP·shareholders.yaml M-ANTITRUST 두 모듈이 X-COMP로 이관되어 각 파일에서 모듈 정의 제거 대상(검수 시 확인).
moves:
  - { file: types/alliance.yaml, id: ALL-COMP-01 }
  - { file: types/alliance.yaml, id: ALL-COMP-02 }
  - { file: types/shareholders.yaml, id: SH-ANT-01 }
  - { file: types/shareholders.yaml, id: SH-ANT-02 }
