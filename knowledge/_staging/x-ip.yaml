module:
  id: X-IP
  name: 산출물·지식재산권
  always_on: false
  activation: strong
  screening_question: 용역·개발 산출물의 인도, 지식재산권 귀속, 제3자·오픈소스 라이선스가 쟁점인가?
  suggest_keywords:
  - 저작재산권
