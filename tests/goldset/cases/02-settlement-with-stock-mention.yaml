# 회귀 케이스: 화해계약 오탐 (2026-07-12 실사용 피드백)
# 민법 화해합의서인데 '주식' 언급이 있어 shareholders(상법 조직행위)로 오감지되던 문제.
# 성격 배타 게이트(nature_signals ≥2 → suppress)로 settlement가 이겨야 함.
id: settlement-with-stock-mention
desc: 화해합의서(주식 언급 포함) — settlement 감지, shareholders 억제
detect_expected: settlement
text: |
  화해합의서

  제1조(분쟁의 내용) 갑과 을 사이의 주식 양도대금 및 그 정산에 관한 분쟁을 대상으로 한다.
  제2조(상호 양보) 양 당사자는 상호 양보하여 을은 갑에게 합의금 오천만원을 지급하고, 갑은 나머지 청구권을 포기한다.
  제3조(부제소) 당사자는 본 화해와 관련하여 향후 민형사상 일체의 소를 제기하지 아니한다.
  제4조(효력) 본 합의서에 정하지 아니한 사항은 민법상 화해의 예에 따른다.
