# X-SEC — 담보(질권·저당·양도담보) 횡단모듈 스테이징 (승격·이동)
# finance.yaml M-SEC(FIN-SEC-01~05)를 횡단 이동. 채널 예금질권·매출채권 양도담보 등 유형 무관 발동 가능해짐.
# absence_precondition(질권·저당·양도담보 계열) 전부 보존 — 담보유형 교차 오탐 차단 게이트 유지.
# activation 근거: suggest_keywords가 '질권'·'근저당'·'양도담보' 등 담보 특이어 전용 → 기본(1개) 활성 제안.
module:
  id: X-SEC
  name: 담보(질권·저당·양도담보)
  always_on: false
  activation: default
  screening_question: 채권 담보로 질권·저당·양도담보를 설정하는가?
  suggest_keywords: [담보, 질권, 근질권, 저당, 근저당, 채권양도, 양도담보]

checks:
  - id: FIN-SEC-01
    check: 동산질권 설정 시 목적물 점유 이전(질물 인도)이 규정되어 있는가
    label: "동산질권 점유이전"
    module: X-SEC
    severity: 필수
    severity_basis: 강행규정(효력요건) — 민법 제330조(질권설정은 목적물 인도로 효력 발생, 요물성)
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [동산질권, 질권, 질물, 점유, 인도]
    absence_check: false
    sources:
      - law: 민법
        article: 제330조
        clause: ""
        quote: 질권의 설정은 질권자에게 목적물을 인도함으로써 그 효력이 생긴다
        verified: true
        source_type: law
  - id: FIN-SEC-02
    check: 지명채권(예금 등) 질권 설정 시 제3채무자 통지·승낙(대항요건)이 규정되어 있는가
    label: "채권질권 대항요건"
    module: X-SEC
    severity: 필수
    severity_basis: 강행규정(대항요건) — 민법 제349조(질권설정 통지·승낙 없으면 제3채무자·제3자 대항 불가)
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [예금질권, 근질권, 채권질권, 제3채무자, 통지, 승낙]
    absence_check: true
    # 조건부 부재체크: 질권 관련 어휘가 본문에 있을 때만 부재알람(저당·양도담보만 있는 계약에서 질권 누락 오탐 방지).
    absence_precondition: [질권, 근질권, 채권질권, 예금질권, 입질]
    sources:
      - law: 민법
        article: 제349조
        clause: 제1항
        quote: 제삼채무자에게 질권설정의 사실을 통지하거나 제삼채무자가 이를 승낙함이 아니면 이로써 제삼채무자 기타 제삼자에게 대항하지 못한다
        verified: true
        source_type: law
  - id: FIN-SEC-03
    check: 저당권(근저당) 설정 시 피담보채권과 채권최고액이 특정되어 있는가
    label: "근저당 채권최고액"
    module: X-SEC
    severity: 필수
    severity_basis: 강행규정 — 민법 제357조(근저당은 채무 최고액 확정 필요)
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [저당권, 근저당, 채권최고액, 피담보채권]
    absence_check: true
    # 조건부 부재체크: 저당 관련 어휘가 본문에 있을 때만 부재알람.
    absence_precondition: [저당, 근저당, 저당권]
    sources:
      - law: 민법
        article: 제357조
        clause: 제1항
        quote: 저당권은 그 담보할 채무의 최고액만을 정하고 채무의 확정을 장래에 보류하여 이를 설정할 수 있다
        verified: true
        source_type: law
      - law: 민법
        article: 제356조
        clause: ""
        quote: 채무의 담보로 제공한 부동산에 대하여 다른 채권자보다 자기채권의 우선변제를 받을 권리
        verified: true
        source_type: law
  - id: FIN-SEC-04
    check: 저당권 피담보채권 범위(원본·이자·지연배상 1년분 한정)가 반영되어 있는가
    label: "저당 피담보채권 범위"
    module: X-SEC
    severity: 권장
    severity_basis: 강행규정(법정 담보범위) — 민법 제360조(지연배상 1년분 한정). 법률상 당연 적용이나 계약 반영 시 오해 방지
    norm_type: 강행
    severity_override: true
    basis: statute
    triggers:
      keywords: [피담보채권, 지연배상, 실행비용]
    absence_check: false
    sources:
      - law: 민법
        article: 제360조
        clause: ""
        quote: 그러나 지연배상에 대하여는 원본의 이행기일을 경과한 후의 1년분에 한하여 저당권을 행사할 수 있다
        verified: true
        source_type: law
  - id: FIN-SEC-05
    check: 채권양도담보 설정 시 채무자 통지·승낙(확정일자)으로 대항요건을 갖추는가
    label: "채권양도담보 대항요건"
    module: X-SEC
    severity: 필수
    severity_basis: 강행규정(대항요건) — 민법 제450조(채권양도 통지·승낙, 제3자 대항은 확정일자 요)
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [채권양도, 양도담보, 채권양수도, 확정일자]
    absence_check: true
    # 조건부 부재체크: 양도담보 관련 어휘가 본문에 있을 때만 부재알람.
    absence_precondition: [양도담보, 채권양도, 채권양수도]
    sources:
      - law: 민법
        article: 제450조
        clause: ""
        quote: 전항의 통지나 승낙은 확정일자있는 증서에 의하지 아니하면 채무자 이외의 제삼자에게 대항하지 못한다
        verified: true
        source_type: law

moves:
  - { file: types/finance.yaml, id: FIN-SEC-01 }
  - { file: types/finance.yaml, id: FIN-SEC-02 }
  - { file: types/finance.yaml, id: FIN-SEC-03 }
  - { file: types/finance.yaml, id: FIN-SEC-04 }
  - { file: types/finance.yaml, id: FIN-SEC-05 }
# refs 주의: tests/goldset/cases/03·04가 FIN-SEC-02·05를 canonical id로 참조(gating은 type/module 아님).
#   id·absence_precondition 보존되므로 골드셋 유효 유지(두 케이스 모두 여신계약이라 X-SEC 활성됨).
