# C3 신설 케이스: GA 위탁판매 계약 — channel 감지 + X-INSMOD(모집규제) 활성.
id: channel-ga
desc: GA 위탁판매 계약 — channel 감지, 모집규제 모듈 활성
detect_expected: channel
active_must_include: [X-INSMOD]
text: |
  보험상품 위탁판매 계약서

  제1조(목적) 갑(보험회사)은 을(법인보험대리점)에게 갑의 보험상품 모집 업무를 위탁한다.
  제2조(모집수수료) 갑은 을에게 모집 실적에 따라 모집수수료를 지급한다.
  제3조(모집질서) 을과 소속 설계사는 보험업법상 모집 관련 규정을 준수한다.
  제4조(계약 해지) 계약 해지 시 을이 모집한 보유계약의 유지관리는 갑이 승계한다.
