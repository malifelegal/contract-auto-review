    severity: {from: 필수, to: 필수}
    verdict: 유지
    reason: 본질적 요소 위탁금지는 회사가 수범자 — 위반 시 감독제재. 규범·리스크 일치.

  - id: CORE-03
    severity: {from: 권장, to: 권장}
    verdict: 유지
    reason: 본질적요소 예외근거 확인. 임의(예외허용)규정, 회사 방어논거. 권장 유지.

  - id: CORE-04
    severity: {from: 필수, to: 필수}
    verdict: 유지
    reason: 직접수행 의무업무 배제 — 회사 수범자, 감독제재 리스크. 일치.

  - id: CORE-05
    severity: {from: 필수, to: 필수}
    verdict: 유지
    reason: 손해사정 평가기준 선정의무 — 회사 수범자(강행). 일치.

  - id: CORE-06
    severity: {from: 필수, to: 필수}
    verdict: 유지
    reason: 금융실명법 등 법령준수 — 회사 수범자. 일치.

  - id: CORE-07
    severity: {from: 필수, to: 필수}
    verdict: 유지
    reason: 재위탁 사전동의(이미 severity_override로 필수 처리). 무단재위탁 시 회사가 통제불능 재위탁으로 감독위반·정보유출 리스크. 회사리스크 관점에서도 필수 타당 — 기존 override 유지.
    note_add: "회사(원위탁)가 재위탁을 통제하지 못하면 감독규정 위반·정보유출 책임을 회사가 짐 — 회사리스크로도 필수 정당."

  - id: CORE-08
    severity: {from: 필수, to: 필수}
    verdict: 유지
    reason: 재위탁 보고주체가 원위탁 금융회사(=회사)로 지정 — 회사가 보고의무자. 누락 시 회사 보고의무 위반. 일치.

  - id: CORE-09
    severity: {from: 필수, to: 필수}
    verdict: 유지
    reason: 법규위반 손해 배상·구상. 핵심 회사리스크 — 회사가 수탁자와 연대배상책임(제3조 제5항)을 지므로, 수탁자에 대한 구상근거 부재 시 회사가 최종 손실 부담. 강행+회사리스크 최상. 필수 확고.
    note_add: "회사는 수탁자 법규위반 손해에 연대배상책임(제3조 제5항)을 지므로, 수탁자 구상·배상 조항 부재는 회사가 손실을 종국 부담할 직접 리스크 — 필수의 핵심."

  - id: CORE-10
    severity: {from: 필수, to: 필수}
    verdict: 유지
    reason: 수탁자 관리·감독권(강행, 업무위수탁운영기준). 관리감독 실효 부재 시 회사가 통제책임 미이행으로 제재. 일치.

  - id: CORE-11
    severity: {from: 필수, to: 필수}
    verdict: 유지
    reason: 업무개시 7영업일 전 사전보고 연동 — 회사가 보고의무자(강행). 위반 시 회사 제재. 일치.

  - id: CORE-12
    severity: {from: 권장, to: 권장}
    verdict: 유지
    reason: 사전보고 생략(사후보고) 사유 확인 — 임의(완화규정), 회사 편익. 권장 유지.

  - id: CORE-13
    severity: {from: 권장, to: 권장}
    verdict: 유지
    reason: 변경권고 시정협조. 감독원 변경권고에 회사가 응하는 구조 — 임의규정이나 불응 시 회사 제재로 이어질 수 있어 권장 유지 적정. note로 회사리스크 병기.
    note_add: "감독원 변경권고 불응은 회사에 대한 후속 감독조치로 이어질 수 있음 — 시정협조 조항 확보 권장."

  - id: CORE-14
    severity: {from: 참고, to: 권장}
    verdict: 상향
    reason: 수탁자가 감독원 검사·자료제출에 응하도록 하는 조항. 부재 시 회사가 감독원 검사에 수탁자 협조를 강제할 계약근거를 잃어, 회사의 감독대응의무(자료제출) 이행불능 리스크. 업무위수탁기준(별표3) 근거로 회사가 수범자에 준함. 실무항목이나 회사 감독대응 실효에 직결 — 권장 상향, override 필요.
    severity_basis_new: "실무 관행 항목이나 회사 감독대응 리스크가 큼 — 회사가 감독원 검사·자료요구에 응할 의무를 지므로, 수탁자 협조 계약근거 부재는 회사의 대응불능 리스크. 업무위수탁기준(별표3) 근거."
    note_add: "회사가 감독원 검사·자료요구 수범자이므로, 수탁자에 협조를 강제할 조항 부재는 회사가 감독대응을 못할 리스크. severity_override 적용."
    override_needed: true

  - id: CORE-15
    severity: {from: 참고, to: 참고}
    verdict: 유지
    reason: 종료 시 업무·자료 이관. 부재 시 회사가 계약종료 후 데이터 미반환·업무공백 리스크(특히 정보유출·업무연속성). 실무항목이나 회사리스크 존재 — 보수적으로 참고 유지하되 note 병기.
    note_add: "이관·반환·파기 조항 부재는 회사가 종료 후 고객데이터 미회수·업무공백에 노출될 리스크 — 실무 확보 권장."

  - id: CORE-16
    severity: {from: 참고, to: 참고}
    verdict: 유지
    reason: 비상계획(BCP). 수탁자 도산·중단 시 회사 업무연속성 리스크이나 법령강제 아님. 참고 유지, note 병기.
    note_add: "수탁자 서비스중단·도산 시 회사 업무연속성 훼손 리스크 — BCP 조항 확보 권장."

  # ── M-DISPATCH (도급·파견 경계) ──
  # 위장도급/불법파견 판정 시 회사(위탁자·사용사업자)가 직접고용 의무·과태료
  # 대상이 될 수 있음 → 회사가 수범자인 고위험 영역. 현행 전부 '참고'(실무·근거미대조).
  - id: DIS-01
    severity: {from: 참고, to: 참고}
    verdict: 유지
    reason: "직접지휘·명령 배제. 위장도급 판정 시 회사(사용사업자)가 직접고용의무·과태료 대상이 되는 고위험이나, 파견법 근거가 원문 미대조 상태(basis practice)라 규범등급 확정 불가. 근거 검증 전까지 참고 유지하되, 회사리스크가 큰 항목임을 note로 명시(검증 후 상향 후보)."
    note_add: "위장도급·불법파견 판정 시 회사(사용사업자)가 직접고용의무·과태료 부담 — 회사 고위험. 파견법 제6조의2·제7조 원문 대조 후 필수 상향 검토 대상."

  - id: DIS-02
    severity: {from: 참고, to: 참고}
    verdict: 유지
    reason: 지시 창구 단일화 — 불법파견 방지 실무. DIS-01과 동일 취지·근거미대조. 참고 유지 + 회사리스크 note.
    note_add: "창구 단일화 미비는 위탁자 직접지휘로 인정될 소지 → 회사 불법파견 리스크. 근거 대조 후 상향 검토."

  - id: DIS-03
    severity: {from: 참고, to: 참고}
    verdict: 유지
    reason: 인력·노무 독립관리 — 불법파견 징표 회피. DIS-01·02와 동일. 참고 유지 + note.
    note_add: "노무관리를 위탁자가 하면 불법파견 징표 → 회사 직접고용·과태료 리스크. 근거 대조 후 상향 검토."

# =============================================================================
# 신규 체크 제안 — RISK 관점 공백 (practice 기반, sources: [])
# =============================================================================
new_checks:
  # procurement: 발주자(회사)를 상대방 귀책손해로부터 보호하는 배상·구상 구조가
  # M-DELIVERY에 없음(지체상금·하자담보는 있으나 제3자 청구·업무손해 일반배상 공백).
  - id: SP-RSK-01
    module: M-DELIVERY
    check: 상대방(수급인·공급자)의 귀책으로 회사에 발생한 손해(제3자 청구·과징금 포함)에 대한 배상 및 회사의 구상권 조항이 있는가
    label: "상대방 귀책 손해배상·구상"
    severity: 권장
    severity_basis: "실무 관행 항목이나 회사(발주자) 리스크가 큼 — 상대방 귀책으로 회사가 대외적으로 먼저 책임을 질 경우 구상근거 확보 필요"
    severity_override: true
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [손해배상, 구상, 배상책임, 제3자, 면책]
    absence_check: true
    sources: []
    note: "회사가 상대방 귀책으로 대외 배상·제재를 먼저 부담할 경우 구상·배상 근거 부재는 회사 손실 종국부담 리스크. severity_override 적용."

  # outsourcing: 위탁자(회사)를 수탁자 귀책 대외책임으로부터 보호하는
  # 손해배상·구상은 CORE-09(법규위반 한정)에 있으나, 법규위반이 아닌 일반
  # 업무처리 과실·고객피해에 대한 회사 구상근거는 공백.
  - id: CORE-RSK-01
    module: M-CORE
    check: 수탁자의 위탁업무 처리상 과실(법규위반 외 일반 업무과실·고객피해 포함)로 회사에 발생한 손해의 배상 및 회사의 구상권 조항이 있는가
    label: "수탁자 일반과실 손해배상·구상"
    severity: 권장
    severity_basis: "실무 관행 항목이나 회사(위탁자) 리스크가 큼 — 법규위반 외 일반 업무과실로 회사가 대외 배상을 먼저 질 경우 수탁자 구상근거 필요(CORE-09 보완)"
    severity_override: true
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [손해배상, 구상, 업무 과실, 배상책임, 고객 피해]
    absence_check: true
    sources: []
    note: "CORE-09는 금융관련법령·위수탁기준 위반 한정. 일반 업무과실·고객피해로 회사가 먼저 배상할 경우 구상근거 공백을 메움. severity_override 적용."
