# risk-b.yaml — C4-b 금융·지분 리스크 재검수 (스테이징)
# 관점: 보험회사(미래에셋생명) 사내변호사 — "잘못되면 우리 회사가 다치는가?"
# 회사 지위 전제: 여신=대주, 투자=투자자/위임자(LP), 채널=원수보험사(위탁자), 주주간=주주(투자·엑싯)
# 원칙: 현행 severity_basis의 규범효력 서술 유지 + 리스크 근거 병기, severity_override 표시. 보수적 — 확신 없으면 유지.
# 기존 파일 수정 금지 — 아래는 제안(스테이징)일 뿐임.

meta:
  reviewer: risk-b
  scope: [finance.yaml, investment.yaml, channel.yaml, shareholders.yaml]
  total_checks: 47
  perspective: 회사가 계약 당사자로서 지는 리스크(담보 실효·회수 불능·원본손실 방어 부재·규제 제재·지분가치 훼손)
  triage: {필수: 회사가 돈을 잃거나 책임지는 데 직결, 권장: 회사 보호 강화·협상 포인트, 참고: 정보성·상대방 보호}

# ═══════════════════════════════════════════════════════════════════
# CHANGES — 판정 변경 제안
# ═══════════════════════════════════════════════════════════════════
changes:

  # ── finance.yaml ──────────────────────────────────────────────
  - id: FIN-LOAN-01
    file: finance.yaml
    current_severity: 참고
    proposed_severity: 권장
    verdict: 상향
    rationale: |
      회사=대주(돈을 빌려주는 쪽). 대출원금·실행방법이 특정되지 않으면 대여채권의
      금액·범위 자체가 불명확해져 회수 시 분쟁·입증곤란 직결. 규범효력상 소비대차는
      낙성계약이라 '선언'이 맞으나, 대주 리스크 관점에선 채권 특정이 회수의 전제.
      다만 실무상 대출계약에서 원금 누락은 드물어 필수까지는 과함 → 권장.
    severity_basis_revised: "소비대차 성립요건 서술(선언) — 민법 제598조. 리스크: 회사=대주 지위에서 대여채권의 금액·실행범위 미특정은 회수 시 채권 특정 곤란으로 직결(severity_override: risk)"
    severity_override: true

  - id: FIN-LOAN-03
    file: finance.yaml
    current_severity: 필수
    proposed_severity: 필수
    verdict: 유지
    rationale: |
      강행규정(이자제한법)이자 회사가 대주일 때 최고이자율 초과분은 무효 → 회사가
      받으려던 이자를 못 받음(회사 손실 방향). 규범효력·리스크 양쪽에서 필수 정합.
      단 note대로 법인 여신·대부업 적용제외 확인 필요.

  # ── investment.yaml ───────────────────────────────────────────
  - id: INV-FUND-03
    file: investment.yaml
    current_severity: 필수
    proposed_severity: 필수
    verdict: 유지
    rationale: |
      회사=투자자. 운용사가 미등록·무인가 사모운용업자이면 투자 자체가 위법 스킴에
      노출 → 원본 회수 불능·감독 리스크. 강행규정(금지)이자 회사 원본손실 방어의
      핵심 게이트. 필수 정합.

  - id: INV-MAN-01
    file: investment.yaml
    current_severity: 필수
    proposed_severity: 필수
    verdict: 유지
    rationale: |
      회사=위임자(투자일임 맡기는 본인). 운용사의 선관·충실의무는 회사 자산을
      부실운용·자기거래로부터 지키는 방어장치 → 원본손실 직결. 강행규정이자
      회사 리스크 방어 핵심. 필수 정합.

  - id: INV-PART-01
    file: investment.yaml
    current_severity: 필수
    proposed_severity: 필수
    verdict: 유지
    rationale: |
      회사=LP(유한책임사원). LP 책임이 출자가액 한도로 제한되지 않으면 조합채무에
      대한 무한책임 노출 위험 → 브리핑의 '무한책임 노출' 필수 기준에 정면 해당.
      규범효력(선언)+리스크(무한책임 차단) 양쪽 필수. 유지.

  - id: INV-PART-02
    file: investment.yaml
    current_severity: 권장
    proposed_severity: 필수
    verdict: 상향
    rationale: |
      회사=LP. Capital Call(추가출자) 요건·한도·불이행효과가 불명확하면 (a)회사가
      예측 못한 추가출자 의무에 노출되거나 (b)디폴트 조항 미비로 회사가 이미 낸
      출자분을 몰취당하는 손실. severity_basis 자체가 "출자자 리스크 큼·손실 직결"이라
      규범효력(practice)과 무관하게 회사 손실 직결 항목. 브리핑의 "원본손실 방어
      장치 부재" 필수 기준에 해당 → 상향. 이미 severity_override=true.
    severity_basis_revised: "실무 항목이나 출자자(LP) 리스크 직결 — 법령 근거 없음. 리스크: 회사=LP 지위에서 캐피탈콜 요건·한도·디폴트효과 미비 시 예측불가 추가출자 노출 또는 기출자분 몰취 손실 직결(severity_override: risk)"
    severity_override: true

  # ── channel.yaml ──────────────────────────────────────────────
  - id: CH-01
    file: channel.yaml
    current_severity: 권장
    proposed_severity: 권장
    verdict: 유지
    rationale: |
      회사=원수보험사(수수료 지급자). 수수료 산정·정산·환수 조건 미비는 금전
      분쟁이나 회사가 '지급하는' 쪽이라 손실 규모가 담보 실효만큼 치명적이진 않음.
      선지급 수수료 환수조건 미비는 회사 손실 방향이나 협상·정산 이슈 → 권장 유지.

  - id: CH-03
    file: channel.yaml
    current_severity: 권장
    proposed_severity: 필수
    verdict: 상향
    rationale: |
      회사=원수보험사. 보험업법 §102는 회사가 모집조직(채널)의 위반행위로 인한
      고객 손해를 1차 배상하도록 강제(모집위탁자 배상책임) → 회사가 먼저 물어주는
      구조. 채널 귀책에 대한 구상 구조가 없으면 회사는 채널 불완전판매·과태료를
      최종 부담(회수 불능). "회사가 책임지는 데 직결" + "회수 불능" 양대 필수
      기준에 해당. 단 §102 원문 미대조(note대로 statute 승격 전) → 리스크 근거로
      필수 상향하되 규범근거는 practice 유지.
    severity_basis_revised: "실무 관행 항목(§102 원문 미대조) — 리스크: 회사가 보험업법 §102로 모집조직 위반 손해를 1차 배상하는 구조에서 채널 귀책 구상장치 부재 시 회사가 배상·과태료를 최종 부담(회수 불능) 직결(severity_override: risk)"
    severity_override: true

  # ── shareholders.yaml ─────────────────────────────────────────
  - id: SH-SHARE-01
    file: shareholders.yaml
    current_severity: 권장
    proposed_severity: 권장
    verdict: 유지
    rationale: |
      회사=주주(투자자). 정관 근거 없는 양도제한은 채권적 효력에 그쳐 제3자 대항
      불가 → 회사가 우선매수·양도통제로 지분방어하려는 장치가 무력화될 수 있음
      (회사 보호 약화). 리스크 방향은 회사 불리이나 규범효력(임의)+실무상 정관
      정비로 보완 가능 → 권장 유지. 주목 후보이나 상향까진 과함.

  - id: SH-SHARE-05
    file: shareholders.yaml
    current_severity: 참고
    proposed_severity: 권장
    verdict: 상향
    rationale: |
      회사=소수주주 지위일 때 우선매수권(ROFR)은 원치 않는 제3자 진입을 막고
      엑싯·지분방어를 확보하는 핵심 협상장치. 행사기간·가격결정 방법 미비 시
      권리 자체가 형해화 → 회사의 지분가치·엑싯 보호 약화. 규범효력은 practice라
      '참고'가 맞으나, 브리핑의 "주주간: 지분가치·엑싯 보호" 관점에서 회사 보호
      강화 항목 → 권장 상향.
    severity_basis_revised: "실무 관행 항목(법령 강제 아님). 리스크: 회사=주주 지위에서 ROFR 행사기간·가격결정 미비 시 지분방어·엑싯 통제장치 형해화(severity_override: risk, 지분가치 보호)"
    severity_override: true

  - id: SH-SHARE-06
    file: shareholders.yaml
    current_severity: 참고
    proposed_severity: 권장
    verdict: 상향
    rationale: |
      회사=소수주주 지위일 때 동반매도참여권(tag-along)은 지배주주 매각 시 회사가
      동일 조건으로 함께 엑싯할 수 있는 소수주주 핵심 보호장치. 부재 시 지배주주만
      프리미엄 매각하고 회사는 유동성 없는 잔여지분에 고립 → 지분가치·엑싯 훼손.
      "지분가치·엑싯 보호" 관점 회사 보호 강화 → 권장 상향.
    severity_basis_revised: "실무 관행 항목(법령 강제 아님). 리스크: 회사=소수주주 지위에서 tag-along 부재 시 지배주주 단독 엑싯에 고립되어 잔여지분 유동성·지분가치 훼손(severity_override: risk, 엑싯 보호)"
    severity_override: true

  - id: SH-SHARE-07
    file: shareholders.yaml
    current_severity: 참고
    proposed_severity: 권장
    verdict: 상향
    rationale: |
      drag-along은 양날의 검. 회사=소수주주 지위면 지배주주의 drag 행사로 원치 않는
      시점·가격에 매도의무를 강제당함 → 공정가격·행사요건 보장 없으면 회사 손실
      방향. 반대로 회사가 지배주주면 엑싯장치. 어느 지위든 행사요건·공정가격 보장
      조항 확인이 회사 지분가치 방어에 직결 → 참고보다 권장. 규범효력(practice)
      유지하되 리스크로 상향. note가 이미 공정성 다툼·보호장치 필요를 명시.
    severity_basis_revised: "실무 관행 항목(법령 강제 아님). 리스크: 회사가 소수주주면 drag 행사로 불리한 시점·가격 매도의무 강제 노출, 공정가격·행사요건 보장 확인이 지분가치 방어에 직결(severity_override: risk)"
    severity_override: true

  - id: SH-SHARE-08
    file: shareholders.yaml
    current_severity: 필수
    proposed_severity: 필수
    verdict: 유지
    rationale: |
      회사=양수인(지분 취득자)일 때 주권교부·명의개서 협력의무는 대항요건 확보의
      핵심 — 명의개서 없으면 회사에 대항 못해(상법§337) 취득지분이 실효. 브리핑의
      "담보 실효(대항요건 미비로 회수 불능)"와 동형의 대항요건 리스크. 강행규정+
      회사 지분권 실효 방어 양쪽 필수. 유지.

  - id: SH-EXIT-04
    file: shareholders.yaml
    current_severity: 필수
    proposed_severity: 필수
    verdict: 유지
    rationale: |
      회사(피투자회사)가 이탈주주 지분을 자기주식으로 취득해 정산하는 구조면
      배당가능이익 한도·취득절차 위반 시 취득 무효 → 정산 스킴 붕괴. 강행규정+
      회사 책임 직결. 유지. (회사가 투자자 지위인 통상 주주간계약에선 M-EXIT
      게이팅으로 미부착될 수 있으나, 부착 시 필수 정합.)

# ═══════════════════════════════════════════════════════════════════
# NEW_CHECKS — 신규 체크 제안 (practice)
# ═══════════════════════════════════════════════════════════════════
new_checks:

  - proposed_id: FIN-SEC-01
    file: finance.yaml
    module: M-GUAR   # 또는 신설 M-SEC(담보) — 파일에 담보 모듈 주석만 있고 실체크 부재
    check: 담보물(질권·근질권·저당·채권양도담보)의 대항요건(질권설정통지·확정일자·등기·등록)이 실행 시점·방법과 함께 규정되어 있는가
    label: "담보 대항요건 구비"
    severity: 필수
    severity_basis: "실무 항목이나 회사=담보권자(대주) 리스크 직결 — 대항요건(제3채무자 통지·확정일자·등기) 미비 시 담보가 제3자·후순위에 대항 불가로 회수 불능. 규범적으로는 민법 제349조(지명채권 질권 대항요건)·제450조(채권양도 대항요건) 강행요건이나 원문 대조 전이므로 practice(severity_override: risk)"
    norm_type: 실무
    severity_override: true
    basis: practice
    triggers:
      keywords: [질권, 근질권, 담보, 저당, 채권양도담보, 대항요건, 확정일자, 질권설정통지]
    absence_check: true
    sources: []
    note: |
      브리핑이 명시한 "담보 실효(대항요건 미비로 회수 불능)"의 직접 대응 체크.
      finance.yaml에 M-SEC(담보) 모듈 주석은 있으나 실제 담보 체크가 하나도 없어
      대주 회사의 핵심 리스크(담보 회수)가 커버 공백 상태. 민법 §349·§450 원문
      대조 후 statute 승격 후보. 제3채무자 통지·확정일자·등기순위 확인.
    verify_needed: true

  - proposed_id: INV-MAN-03
    file: investment.yaml
    module: M-MANDATE
    check: 투자일임재산의 분별관리(고유재산과 분리보관)와 신탁업자 예탁 등 재산보호 장치가 규정되어 있는가
    label: "일임재산 분별관리·보호"
    severity: 필수
    severity_basis: "실무 항목이나 회사=위임자 원본손실 방어 직결 — 일임재산이 운용사 고유재산과 분리·예탁되지 않으면 운용사 도산 시 회사 자산이 도산재단에 혼입되어 회수 불능. 자본시장법상 분별관리 의무의 계약 반영 여부(원문 미대조)로 practice(severity_override: risk)"
    norm_type: 실무
    severity_override: true
