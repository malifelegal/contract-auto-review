# 기본 감지 케이스 — NDA 정상 감지(다른 유형으로 새지 않는지).
id: nda-basic
desc: 비밀유지계약 — nda 정상 감지
detect_expected: nda
text: |
  비밀유지계약서

  제1조(목적) 본 계약은 양 당사자가 업무 협의 과정에서 상호 제공하는 비밀정보의 보호에 관한 사항을 정함을 목적으로 한다.
  제2조(비밀정보의 정의) 비밀정보란 서면, 구두 그 밖의 방법으로 제공되는 기술상 또는 경영상 정보로서 비밀로 표시된 것을 말한다.
  제3조(비밀유지의무) 수령자는 비밀정보를 제3자에게 공개하거나 누설하여서는 아니 된다.
  제4조(반환) 수령자는 제공자의 요청이 있는 경우 비밀정보를 즉시 반환하거나 폐기한다.
