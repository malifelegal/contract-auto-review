# X-INSMOD — 보험모집 규제 횡단모듈 스테이징 (통합)
# outsourcing.yaml M-SOLICIT(SOL-01~06) + alliance.yaml M-INSMOD(ALL-INS-01) → 모집규제 1벌.
# ALL-INS-01(보험업법 제83조 제1항 모집자격자)은 SOL-01과 동일 규범 → SOL-01로 통합(canonical=SOL-01).
#   SOL-01이 보험권 표준내부통제기준 제37조(자율규제) source까지 포함해 상위집합이므로 SOL-01 채택.
# activation 근거: 원 M-SOLICIT screening='보험모집·판매 관련 업무인가', suggest_keywords가 '모집'·'중개' 등
#   보험 특이어 위주이나 '판매대리'·'상품제공' 등 범용어 혼입 → strong(2개+) 제안.
module:
  id: X-INSMOD
  name: 보험모집 규제
  always_on: false
  activation: strong
  screening_question: 보험 모집·판매 또는 대리·중개(방카·GA·제휴판매 등) 업무를 위탁·수행하는가?
  # 원 M-SOLICIT suggest([모집, 판매대리, 보험계약 체결, 중개]) + M-INSMOD suggest([모집, 위탁판매, 상품제공, 퇴직연금, 방카]) 합집합에서
  # 범용어(상품제공·위탁·판매) 제거하고 모집 특이어만 정제.
  suggest_keywords: [모집, 보험설계사, 보험대리점, 보험중개사, 모집종사자, 방카, 위탁판매, 대리ㆍ중개]

checks:
  - id: SOL-01
    module: X-INSMOD
    check: 위탁 상대방이 보험설계사·보험대리점·보험중개사 등 모집 자격자로서 유효하게 등록되어 있는가
    label: "모집 자격자 등록 확인"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 보험업법 제83조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [모집, 보험설계사, 보험대리점, 보험중개사]
    absence_check: true
    sources:
      - law: 보험업법
        article: 제83조
        clause: 제1항
        quote: '모집을 할 수 있는 자는 다음 각 호의 어느 하나에 해당하는 자이어야 한다'
        verified: true
        source_type: law
      - law: 보험권 표준내부통제기준
        article: 제37조
        clause: 제3항
        quote: '회사는 모집종사자와의 위탁계약 체결 전에 모집종사자의 보험업법 상 등록요건 및 재무상태 등을 심사‧평가하여 위탁계약 체결 여부 등에 반영하는 절차를 마련하여야 한다'
        verified: true
        source_type: self_regulation
  - id: SOL-02
    module: X-INSMOD
    check: 보험업법 등에 따른 위탁계약 해지 절차를 마련하고 그 해지 절차와 사유를 위탁계약서에 반영·설명하도록 되어 있는가
    label: "위탁계약 해지절차 마련"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [등록, 말소, 취소, 자격]
    absence_check: true
    sources:
      - law: 보험권 표준내부통제기준
        article: 제37조
        clause: 제8항
        quote: '회사는 보험업법 등에 따른 위탁계약 해지 절차를 마련해야 하며, 그 해지 절차와 사유를 위탁계약서에 반영하고 모집종사자에게 설명하여야 한다'
        verified: true
        source_type: self_regulation
    note: 자율규제(보험권 표준내부통제기준 제37조)는 위탁계약 해지 절차·사유의 계약서 반영을 요구
  - id: SOL-03
    module: X-INSMOD
    check: 수탁자의 금융소비자보호법 위반으로 발생한 손해에 대한 책임 분담 조항이 있는가
    label: "금소법 위반 책임 분담"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융소비자 보호에 관한 법률 제44조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [손해배상, 금융소비자, 위반, 배상]
    absence_check: true
    sources:
      - law: 금융소비자 보호에 관한 법률
        article: 제44조
        clause: 제1항
        quote: '금융상품판매업자등이 고의 또는 과실로 이 법을 위반하여 금융소비자에게 손해를 발생시킨 경우에는 그 손해를 배상할 책임이 있다'
        verified: true
  - id: SOL-04
    module: X-INSMOD
    check: 수탁자의 대리·중개 행위로 금융소비자에게 발생한 손해에 대해 회사가 배상책임을 지는 구조를 전제로 한 책임 조항이 있는가
    label: "대리·중개 배상책임 구조"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융소비자 보호에 관한 법률 제45조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [배상책임, 대리, 중개, 모집]
    absence_check: true
    sources:
      - law: 금융소비자 보호에 관한 법률
        article: 제45조
        clause: 제1항 본문
        quote: '대리ㆍ중개 업무를 할 때 금융소비자에게 손해를 발생시킨 경우에는 그 손해를 배상할 책임이 있다'
        verified: true
    note: 구 보험업법 제102조는 2020. 3. 24. 삭제 — 금소법 제45조로 이관(보험중개사는 적용 제외)
  - id: SOL-05
    module: X-INSMOD
    check: 선임·감독상 적절한 주의(면책 단서)를 증빙할 수 있는 교육·점검·관리 체계 조항이 있는가
    label: "선임·감독 주의 면책증빙"
    severity: 권장
    severity_basis: "면책요건임(선임·감독 주의 시 책임 배제) — 금융소비자 보호에 관한 법률 제45조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [교육, 점검, 감독, 선임]
    absence_check: true
    sources:
      - law: 금융소비자 보호에 관한 법률
        article: 제45조
        clause: 제1항 단서
        quote: '다만, 금융상품직접판매업자가 금융상품판매대리ㆍ중개업자등의 선임과 그 업무 감독에 대하여 적절한 주의를 하였고 손해를 방지하기 위하여 노력한 경우에는 그러하지 아니하다'
        verified: true
        source_type: law
      - law: 보험권 표준내부통제기준
        article: 제38조
        clause: 제1항
        quote: '회사는 모집종사자의 위탁업무 수행에 관한 평가기준을 수립·운영하도록 해야 한다'
        verified: true
        source_type: self_regulation
  - id: SOL-06
    module: X-INSMOD
    check: 회사가 금융소비자에게 배상한 경우 수탁자에 대한 구상 조항이 있는가
    label: "소비자 배상 구상권"
    severity: 참고
    severity_basis: "구상권 보전 선언규정임 — 금융소비자 보호에 관한 법률 제45조"
    norm_type: 선언
    basis: statute
    triggers:
      keywords: [구상, 구상권, 배상]
    absence_check: true
    sources:
      - law: 금융소비자 보호에 관한 법률
        article: 제45조
        clause: 제2항
        quote: '제1항 본문에 따른 금융상품직접판매업자의 손해배상책임은 금융상품판매대리ㆍ중개업자등에 대한 금융상품직접판매업자의 구상권 행사를 방해하지 아니한다'
        verified: true

deletions:
  - file: types/alliance.yaml
    id: ALL-INS-01
    reason: 보험업법 제83조 제1항 모집자격자 요건으로 SOL-01과 동일 규범. SOL-01이 보험권 표준내부통제기준 제37조(자율규제) source까지 포함한 상위집합이므로 SOL-01로 통합.
    canonical: SOL-01
    refs: 없음 (tests/·docs/ 내 ALL-INS-01 id 참조 없음)
