module:
  id: X-CROSS
  name: 국외 당사자·준거법·관할
  always_on: false
  # activation 제안: 국외성 신호(외국법인 당사자·영문계약·해외 이행지·외화 대금)가 잡힐 때만 활성화.
  # 대부분 국내 계약에는 무관하므로 always_on 부적합. 준거법·관할 조항 부재 자체가 리스크이므로
  # (absence_check) 국외성이 검출되면 조항 존재 여부까지 점검하도록 스크리닝으로 발동.
  activation: screening
  screening_question: 계약 상대방이 외국 법인·개인이거나, 계약이 영문으로 작성되었거나, 이행지·결제통화가 국외/외화인가?
  suggest_keywords:
    - 준거법
    - governing law
    - 관할
    - jurisdiction
    - 중재
    - arbitration
    - 영문
    - English
    - Agreement
    - 해외
    - 국외
    - 외국
    - 원천징수
    - 외화
    - USD
checks:
  - id: CRS-01
    check: 계약에 적용될 준거법(governing law)을 당사자가 명시적으로 선택하는 조항이 존재하고 그 지정이 명확한가
    label: "준거법 명시"
    severity: 권장
    severity_basis: "근거 조문이 임의규정(당사자 선택권 부여)임 — 국제사법 제45조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [준거법, governing law, 적용 법률, 적용법, 이 계약의 해석]
    absence_check: true
    sources:
      - law: 국제사법
        article: 제45조
        clause: 제1항
        quote: '계약은 당사자가 명시적 또는 묵시적으로 선택한 법에 따른다. 다만, 묵시적인 선택은 계약내용이나 그 밖의 모든 사정으로부터 합리적으로 인정할 수 있는 경우로 한정한다'
        verified: true
        source_type: law
    note: "국제사법 §45①은 당사자자치(준거법 선택권)를 부여하는 임의규정. 선택이 없으면 §46(가장 밀접한 관련국법)으로 보충되어 예측가능성이 낮아지므로 명시 선택이 권장. §45④: 모든 요소가 한 국가에만 관련되면 그 국가의 강행규정은 배제되지 않음(순수 국내거래에 외국법 선택 시 국내 강행규정 잔존). 보험업 등 규제법상 강행규정은 준거법 선택으로 회피 불가."
  - id: CRS-02
    check: 분쟁해결을 위한 재판관할(전속/비전속) 또는 중재조항이 존재하고, 관할법원·중재기관·중재지·중재규칙이 특정되어 있는가
    label: "관할·중재 조항 특정"
    severity: 권장
    severity_basis: "근거 조문이 임의규정(합의관할권 부여)임 — 국제사법 제8조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [관할, jurisdiction, 전속적 관할, 중재, arbitration, 중재기관, 관할법원]
    absence_check: true
    sources:
      - law: 국제사법
        article: 제8조
        clause: 제1항
        quote: '당사자는 일정한 법률관계로 말미암은 소에 관하여 국제재판관할의 합의(이하 이 조에서 "합의"라 한다)를 할 수 있다'
        verified: true
        source_type: law
    note: "국제사법 §8은 국제재판관할 합의권을 부여하는 임의규정. §8②: 합의는 서면(전자적 의사표시 포함)이어야 함. §8③: 관할합의는 전속적인 것으로 '추정'. §8⑤: 외국법원 전속합의가 있으면 국내법원은 원칙적으로 소를 각하(예외 4호). 전속/비전속 여부·중재기관(예: KCAB·ICC·SIAC)·중재지·중재규칙을 특정하지 않으면 관할 다툼·집행 리스크. 중재합의 성립·효력은 중재법 별도 규율(원문 미확인)."
  - id: CRS-03
    check: 국문·영문 등 복수 언어로 작성된 경우, 언어 간 불일치 시 어느 언어본이 우선하는지 정하는 조항이 있는가
    label: "언어 우선순위"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [영문, English, 국문, 언어, 우선한다, 정본, 번역본, prevail]
    absence_check: true
    sources: []
    note: "복수 언어본 작성 시 해석 불일치를 막기 위한 우선언어(governing language) 조항은 실무 표준이나 법령이 강제하는 것은 아님. 준거법이 외국법이면 해당 외국법의 해석원칙이 적용될 수 있으므로 우선언어 명시가 분쟁예방에 유효."
  - id: CRS-04
    check: 국외 지급·외화 결제 시 외국환거래 관련 신고·보고 의무와 결제통화·환위험 부담 주체가 계약에 반영되어 있는가
    label: "외환 신고·결제통화"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님) — 개별 거래유형별 외국환거래법령 신고의무는 별도 확인 필요"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [외화, USD, 결제통화, 환율, 외국환, 송금, 환위험]
    absence_check: false
    sources: []
    note: "외국환거래법·외국환거래규정상 자본거래·지급등의 신고·보고 의무가 거래유형에 따라 발생할 수 있음(자본거래 신고·해외직접투자 신고 등). 계약 조항 강제사항이 아니라 이행상 규제라 basis=practice로 두되, 해당 거래유형이 특정되면 외국환거래법령 원문 확인 후 별도 check 승격 검토(현재 조문 미확인 — 거래유형 미특정)."
  - id: CRS-05
    check: 국외 당사자에 대한 대가 지급 시 원천징수(제한세율·조세조약 적용) 부담 주체와 gross-up 여부가 명확한가
    label: "원천징수·조세부담"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [원천징수, 조세조약, gross-up, 세금 부담, withholding, 제한세율]
    absence_check: false
    sources: []
    note: "비거주자·외국법인에 대한 국내원천소득(이자·사용료·용역대가 등) 지급 시 법인세법·소득세법상 원천징수 의무 발생 가능, 조세조약상 제한세율 적용은 거주자증명·수익적소유자 요건에 좌우됨. 세부담 주체·gross-up 명시는 실무 표준. 조문 인용은 거래·소득유형 특정 후 원천징수 조항 원문 확인 필요(현재 미특정 — basis=practice)."
  - id: CRS-06
    check: 계약 상대방·이행이 국제 제재(sanctions)·수출통제 대상에 해당하지 않음을 확인하고, 제재 저촉 시 이행거절·해지 등 대응 조항을 두었는가
    label: "제재·수출통제 해당성"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님) — 대외무역법·전략물자 수출입고시 등 개별 규제는 별도 확인 필요"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [제재, sanctions, 수출통제, 전략물자, OFAC, 금수, 수출허가]
    absence_check: false
    sources: []
    note: "국내법(대외무역법·전략물자 수출입고시)과 외국법(미국 OFAC 제재·EU 제재 등)이 병존 적용될 수 있음. 금융회사는 자금세탁방지·제재 준수 의무(특정금융정보법·검사규정) 별도. 제재 저촉 리스크는 계약 강제조항이 아니라 컴플라이언스 리스크라 basis=practice. 구체 규제 저촉 시 해당 법령 원문 확인 후 승격 검토(현재 조문 미확인)."
