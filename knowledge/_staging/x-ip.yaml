checks:
- id: ITDL-01
  module: X-IP
  check: 개발 산출물(소스코드·프로그램)의 저작재산권 귀속과 2차적저작물작성권 포함 여부가 명시되어 있는가
  label: 저작권 귀속·2차저작물
  severity: 참고
  severity_basis: 추정규정임 — 저작권법 제45조
  norm_type: 추정
  basis: statute
  triggers:
    keywords:
    - 저작재산권
    - 소스코드
    - 2차적저작물
    - 권리 귀속
    - 업무상저작물
  absence_check: true
  sources:
  - law: 저작권법
    article: 제45조
    clause: 제2항
    quote: 저작재산권의 전부를 양도하는 경우에 특약이 없는 때에는 제22조에 따른 2차적저작물을 작성하여 이용할 권리는 포함되지 아니한 것으로 추정한다. 다만, 프로그램의 경우 특약이 없으면 2차적저작물작성권도 함께 양도된 것으로 추정한다.
    verified: true
    source_type: law
  - law: 저작권법
    article: 제9조
    clause: 본문
    quote: 법인등의 명의로 공표되는 업무상저작물의 저작자는 계약 또는 근무규칙 등에 다른 정함이 없는 때에는 그 법인등이 된다
    verified: true
    source_type: law
  note: 저작재산권 양도 시 2차적저작물작성권은 특약이 없으면 미양도로 추정됨(제45조② — 다만 프로그램은 반대추정). 산출물 활용 범위 확보를 위해 2차적저작물작성권 포함을 명시할 필요. 업무상저작물의 저작자 귀속 기준은 제9조
- id: ITDL-02
  module: X-IP
  check: 소스코드·산출물·형상관리 자료의 인도 범위·시점 또는 소스코드 에스크로(임치) 조항이 있는가
  label: 소스코드 인도·에스크로
