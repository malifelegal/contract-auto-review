module:
  id: X-EFIN
  name: 전자금융 정보처리시스템 외주
  always_on: false
  activation: strong
  screening_question: 전자금융거래를 위한 정보처리시스템의 개발·운영·유지관리 외주인가?
  suggest_keywords:
  - 전자금융
  - 전자금융거래
  - 정보처리시스템
  - 금융거래정보
  - 전산실
  - 전자금융보조업자
  - 금융거래
checks:
- id: ITSEC-01
  module: X-EFIN
  tier: conditional
  check: 외부주문 개발업무에 사용되는 업무장소·전산설비를 내부 업무용과 분리하여 설치·운영하는 조항이 있는가
  label: 업무장소·전산설비 분리
  severity: 필수
  severity_basis: 근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조
  norm_type: 강행
  basis: statute
  triggers:
    keywords:
    - 분리
    - 업무장소
    - 전산설비
    - 개발 장소
    - 개발망
  absence_check: true
  sources:
  - law: 전자금융감독규정
    article: 제60조
    clause: 제1항 제1호
    quote: 외부주문등에 의한 정보처리시스템의 개발업무에 사용되는 업무장소 및 전산설비는 내부 업무용과 분리하여 설치ㆍ운영
    verified: true
