# ══════════════════════════════════════════════════════════════════════
# Phase C4-c 스테이징 — 공통(CMN core)·NDA·제휴·화해 리스크 재검수
# 관점: 미래에셋생명보험 사내변호사 — "잘못되면 우리 회사가 다치는가?"
#   필수=회사가 돈을 잃거나 책임지는 데 직결(무한배상·구상불능·권리포기 과다)
#   권장=회사 보호 강화·협상 포인트 / 참고=정보성
# ⚠️ 기존 파일 미수정 — 본 파일은 스테이징 보고. 반영은 팀리드 판단.
#
# ── 심각도 체계상 유의점(중요) ─────────────────────────────────────
# 이 지식베이스의 severity는 "업무 중요도"가 아니라 "근거 조문의 규범 효력"에서
# 도출됨(schema.md 심각도 도출 규칙). basis:practice → 무조건 '참고'.
# 그런데 이번 관점(회사가 다치는가)은 규범효력이 아니라 '회사 손실 리스크'라
# 도출규칙과 축이 다름. 편면성 리스크는 대부분 법령강행이 아닌 협상·형평 쟁점
# (practice)이므로 도출규칙대로면 '참고'로 눌림.
# → 처리 방침: 회사 손실 직결 편면성 신규체크는 severity_override:true +
#    note에 사유를 달아 '권장'으로 승격(도출규칙 의도적 예외). 순수 정보성은 '참고' 유지.
#    팀리드가 severity 축을 규범효력→업무리스크로 재정의할지 최종결정 대상.
# ══════════════════════════════════════════════════════════════════════

changes:
  # ── CMN core: 편면성 관점 문구 보강(check 수정 제안) ──
  # 기존 severity(참고/권장)는 규범효력 도출규칙 산물이라 유지. 편면성은
  # 별도 신규체크(RISK-*)로 분리하되, 아래 항목은 check 문언에 형평 관점을
  # 얹어 검토자가 편면성을 놓치지 않게 함(문구 보강 우선 원칙).

  - id: CMN-07
    severity: {from: 참고, to: 참고}
    verdict: 유지
    reason: 자동갱신+갱신거절 통지기한이 회사에만 촉박하면 원치 않는 자동연장으로 회사가 계속 구속됨(이탈비용 발생)
    check_new: 갱신 방식(자동갱신·합의갱신)과 갱신 거절 통지 기한이 규정되어 있고, 통지기한이 어느 일방(특히 우리 회사)에만 과도하게 촉박하지 않은가
    note_add: 자동갱신 조항에서 갱신거절 통지기한이 회사에만 짧으면 실기 시 원치 않는 연장에 구속 — RISK-04와 연계

  - id: CMN-08
    severity: {from: 참고, to: 참고}
    verdict: 유지
    reason: 상대방만 임의(무사유)해지 가능하거나 회사 해지사유만 좁으면 회사가 계약에 편면적으로 묶임
    check_new: 해지·해제 사유(중대한 위반, 도산 등)가 규정되어 있고, 임의해지권·해지사유가 당사자 간 균형 있게(회사에만 불리하지 않게) 부여되어 있는가
    note_add: 상대방만 무사유 임의해지 가능하거나 회사측 해지사유만 협소하면 편면 — RISK-03과 연계

  - id: CMN-11
    severity: {from: 참고, to: 참고}
    verdict: 유지
    reason: 손해배상 조항이 회사 책임만 규정하고 상대방 책임은 누락·완화되어 있으면 편면 노출. 무한배상 노출은 RISK-01에서 별도 포착
    check_new: 손해배상 책임의 귀책사유와 배상 범위 조항이 있고, 그 책임이 어느 일방(특히 우리 회사)에만 편면적으로 부과되지 않는가
    note_add: 회사 배상책임엔 상한이 없는데 상대방엔 상한이 있는 불균형은 RISK-01에서 포착

  - id: CMN-14
    severity: {from: 참고, to: 참고}
    verdict: 유지
    reason: 책임상한(cap)이 상대방에게만 적용되고 회사엔 없거나, 면책이 상대방에게만 넓으면 회사가 무한책임·무면책으로 편면 노출
    check_new: 책임 상한(cap)·면책 조항이 고의·중과실을 상한 예외로 명시하고 있고, 상한·면책의 이익이 당사자 간 대칭적으로(회사에만 불리하지 않게) 배분되어 있는가
    note_add: cap이 상대방에만 있고 회사엔 없는 비대칭, 면책이 상대방에만 넓은 비대칭은 RISK-01·RISK-05에서 포착

new_checks:
  # ══════════════════════════════════════════════════════════════════
  # 신규 RISK-* 체크 — 공통(무모듈=상시). 편면성·회사손실 직결 관점.
  # 모두 basis:practice(형평·협상 쟁점, 특정 강행조문 요건 아님) → sources:[]
  # 회사손실 직결 항목은 severity_override:true로 '권장' 승격(도출규칙 예외).
  # ══════════════════════════════════════════════════════════════════

  - id: RISK-01
    check: 손해배상 책임의 상한(cap)이 회사에는 없거나 높고 상대방에게만 낮게 설정되어 있는 등, 배상책임의 한도가 회사에 불리하게 편면적으로 정해져 있지 않은가
    label: "배상책임 상한 편면성"
    severity: 권장
    severity_override: true
    severity_basis: "회사 손실 직결(무한배상 노출) 리스크 — 규범효력 도출규칙상 practice=참고이나 회사가 다치는 편면 조항이라 권장 승격(의도적 예외)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [책임 상한, 배상액의 한도, 배상한도, 한도로 한다, limitation of liability, cap, 배상액은, 초과하지 아니]
    absence_check: false
    sources: []
    note: 상대방 배상책임엔 상한이 있는데 회사 배상책임엔 상한이 없으면 회사만 무한배상 노출. 상한을 둔다면 대칭 적용 여부·상한액 규모(연간 대가 대비)를 확인. 회사가 지급인이면 상한 도입이 유리, 회사가 수취인이면 상대방 상한이 배상 부족을 초래하는지 확인.

  - id: RISK-02
    check: 상대방의 채무불이행·귀책으로 회사가 제3자(고객·감독당국 등)에 대해 부담한 손해·제재·비용을 상대방에게 구상·전가할 수 있는 조항이 있는가
    label: "구상·비용전가 확보"
    severity: 권장
    severity_override: true
    severity_basis: "회사 손실 직결(구상 불능) 리스크 — practice이나 상대방 귀책으로 인한 회사 손실을 회수하지 못하면 회사가 다침. 권장 승격(의도적 예외)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [구상, 면책, indemnify, indemnification, 배상하고 방어, 손해를 보전, 제재금, 과징금, 제3자 청구, 상대방의 귀책으로]
    absence_check: false
    sources: []
    note: 위탁·제휴 상대방의 위법·과실로 회사가 고객배상·감독제재를 받은 경우, 상대방에 구상·전가하는 근거가 없으면 회사가 종국 부담. 구상권·면책(indemnity)·비용보전 조항 유무를 확인.

  - id: RISK-03
    check: 계약의 임의(무사유)해지권이 상대방에게만 부여되어 있거나, 회사의 해지에만 과중한 위약금·손해배상이 부과되는 등 해지권이 회사에 불리하게 편면적으로 설계되어 있지 않은가
    label: "해지권 편면성"
    severity: 권장
    severity_override: true
    severity_basis: "회사 손실·구속 직결 리스크 — practice이나 회사만 계약에 묶이거나 회사 해지에만 과중한 위약금이 붙으면 회사가 다침. 권장 승격(의도적 예외)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [임의해지, 무사유 해지, 언제든지 해지, 사유 없이, 위약금, 중도해지, 해지 수수료, 잔여 대금]
    absence_check: false
    sources: []
    note: 상대방만 무사유 임의해지 가능하면 회사는 사업 안정성을 상실. 회사 해지에만 위약벌·잔여대금 완납 부담이 붙으면 이탈비용 편중. CMN-08과 연계 — 해지권·해지비용의 대칭성 확인.

  - id: RISK-04
    check: 자동갱신 조항에서 갱신거절(해지) 통지기한이 회사에만 과도하게 촉박하여, 실기 시 회사가 원치 않는 계약연장에 구속되는 구조는 아닌가
    label: "자동갱신 통지기한 편면성"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님) — 갱신관리 리스크이나 손실 직결도는 해지·배상보다 낮아 참고 유지"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [자동갱신, 자동으로 연장, 별도의 의사표시가 없으면, 갱신 거절, 갱신하지 아니, 개월 전까지, 일 전까지]
    absence_check: false
    sources: []
    note: 자동갱신+갱신거절 통지기한(예 만료 6개월 전)이 회사에만 촉박하면 통지 실기 시 원치 않는 연장에 구속. CMN-07과 연계 — 통지기한의 대칭성·현실적 관리가능성 확인.

  - id: RISK-05
    check: 진술·보증(representations & warranties) 또는 면책(indemnity)의 범위가 회사에만 좁게(상대방에만 넓게) 설정되어, 회사가 부담하는 보증·면책 리스크가 편면적으로 무겁지 않은가
    label: "진술보증·면책 편면성"
    severity: 권장
    severity_override: true
    severity_basis: "회사 손실 직결(보증·면책 노출) 리스크 — practice이나 회사만 광범위한 보증·면책을 부담하면 회사가 다침. 권장 승격(의도적 예외)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [진술 및 보증, 진술과 보증, representations, warranties, 보증한다, 면책, indemnify, 하자, 보증 위반, 진술보증]
    absence_check: false
    sources: []
    note: 회사의 진술·보증만 광범위하고 상대방 보증은 형식적이거나, 면책의무가 회사에만 넓으면 회사가 편면적 리스크 부담. 보증범위·존속기간·상한(cap)·바스켓의 대칭성 확인.

  - id: RISK-06
    check: 위약벌 또는 손해배상액의 예정이 회사에만 과중하게(상대방보다 무겁게) 부과되어 있지 않은가, 또는 회사가 과도한 위약벌을 상대방에 설정하여 감액·무효 위험을 지고 있지 않은가
    label: "위약벌·손해배상예정 편면성"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님) — 편면 위약벌은 리스크이나 민법 제398조 감액법리로 완충되어 참고. 회사가 과도설정한 경우 무효·감액 위험은 note로 경고"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [위약벌, 위약금, 손해배상액의 예정, 예정액, 페널티, penalty, 배액, 배상하기로]
    absence_check: false
    sources: []
    note: 위약벌이 회사에만 무겁게 부과되면 편면 부담. 반대로 회사가 상대방에 과도한 위약벌을 설정하면 부당히 과다하여 민법 제398조상 법원 감액·위약벌 일부무효 위험(회사에 유리해 보여도 집행단계에서 무력화). 위약벌/예정 성격 구분·규모 형평 확인.(민법 제398조 원문 DB 미수록 — 조문 미확인)

  # ══════════════════════════════════════════════════════════════════
  # 화해(settlement) 특칙 신규체크 — 회사가 화해 당사자.
  # 최대 리스크 = 청구권 포기 범위 과다(회사가 회수·행사 가능한 권리를 상실).
  # M-SETTLE 모듈, basis:practice. 회사 권리상실 직결이라 권장 승격.
  # ══════════════════════════════════════════════════════════════════

  - id: RISK-SET-01
    module: M-SETTLE
    check: 회사가 포기하는 청구권·권리의 범위가 화해 대상 분쟁으로 한정되지 않고 "일체의 청구권" 등 포괄적으로 규정되어, 회사가 장래 행사할 다른 권리(별개 채권·구상권·미확정 손해)까지 상실하는 구조는 아닌가
    label: "회사 청구권 포기범위 과다"
    severity: 권장
    severity_override: true
    severity_basis: "회사 권리상실 직결 리스크 — practice이나 포괄적 청구권 포기는 회사가 회수할 권리를 잃게 함(화해 최대 리스크). 권장 승격(의도적 예외)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [일체의 청구, 일체의 권리, 모든 청구권, 향후 어떠한, 이의를 제기하지 않, 민형사상, 청구권 포기, 더 이상, 어떠한 이의도]
    absence_check: false
    sources: []
    note: 회사가 포기측이면 "일체의 청구권 포기"는 화해대상 외 별개 채권·구상권·미확정 손해까지 상실시킬 수 있음(창설적 효력·부제소 효과가 포괄범위에 미침). 포기대상을 화해 분쟁으로 한정·열거하고, 회사가 보유·유보할 권리(별건 구상권 등)를 명시적으로 제외할 것. SETTLE-06과 방향 반대(SETTLE-06은 상대방 포기의 특정성, 본항은 회사 포기의 과다 방지).

  - id: RISK-SET-02
    module: M-SETTLE
    check: 부제소특약이 회사에만(또는 회사에 광범위하게) 부과되어, 회사가 향후 관련·별개 분쟁에서 제소·권리주장할 길이 편면적으로 봉쇄되지 않는가
    label: "회사 부제소 편면성"
    severity: 참고
