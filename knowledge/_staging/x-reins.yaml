# X-REINS — 재보험 횡단모듈 스테이징 (이동)
# alliance.yaml M-REINS(ALL-REINS-01, 상법 제661조 재보험 원계약 분리) 횡단 이동.
# 현행 재보험 check는 ALL-REINS-01 단 1개(선언규정, 상법 제661조).
# activation 근거: suggest_keywords가 '재보험'·'출재'·'수재'·'특약' 등 재보험 특이어 전용 → 기본(1개) 활성 제안.
#   다만 '특약'은 일반 계약에도 등장 → suggest에서 제거(범용어 정제), 재보험 고유어만 유지.
module:
  id: X-REINS
  name: 재보험
  always_on: false
  activation: default
  screening_question: 재보험 출재·수재 또는 공동재보험 협약인가?
  # 원 M-REINS suggest([재보험, 출재, 수재, 특약])에서 범용어 '특약' 제거.
  suggest_keywords: [재보험, 출재, 수재, 공동재보험]

checks:
  - id: ALL-REINS-01
    check: 재보험 출재 시 원보험계약의 효력과 분리(원계약 무영향)가 전제되어 있는가
    label: "재보험 원계약 분리"
    module: X-REINS
    severity: 참고
    severity_basis: 선언규정 — 상법 제661조(재보험은 원보험계약 효력에 무영향)
    norm_type: 선언
    basis: statute
    triggers:
      keywords: [재보험, 출재, 원보험]
    absence_check: false
    sources:
      - law: 상법
        article: 제661조
        clause: ""
        quote: 이 재보험계약은 원보험계약의 효력에 영향을 미치지 아니한다
        verified: true
        source_type: law

moves:
  - { file: types/alliance.yaml, id: ALL-REINS-01 }
