# C3 재편 케이스: 시스템 구축 계약 — procurement(조달 통합) 감지.
# 구 it-outsourcing 소멸 후에도 IT 조달이 제 집을 찾는지 + §60(X-EFIN)이 일반 구축에 안 뜨는지.
id: procurement-system
desc: 일반 시스템 구축 계약 — procurement 감지, X-EFIN 오탐 금지
detect_expected: procurement
consider_must_exclude_prefix: [ITSEC-]
text: |
  시스템 구축 용역계약서

  제1조(목적) 갑은 을에게 사내 인사관리 시스템 구축 용역을 발주하고 을은 이를 수행한다.
  제2조(납품·검수) 을은 완성된 시스템을 납품하고 갑은 14일 이내 검수한다.
  제3조(하자보수) 을은 검수 완료일로부터 1년간 하자를 무상 보수한다.
  제4조(대금) 갑은 검수 완료 후 30일 이내 용역대금을 지급한다.
  제5조(지체상금) 을이 납품을 지체한 경우 지체일수당 1천분의 1의 지체상금을 부담한다.
