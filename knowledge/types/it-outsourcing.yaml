meta:
  type_id: it-outsourcing
  type_name: IT외주·전산용역
  detect_keywords: [전산, 시스템 개발, 소프트웨어, SI, 정보시스템, 정보처리, 전산용역, 외주, 유지보수, 시스템 구축, 시스템 고도화, 솔루션 도입, 프로그램 개발, 서비스 이용계약, 라이선스, 클라우드, SaaS]
  modules:
    - id: M-DELIV
      name: 산출물·지식재산권·검수·하자
      always_on: true
      screening_question: null
      suggest_keywords: []
checks:
  # ── M-ITSEC: 전자금융감독규정 제60조(외부주문등에 대한 기준) ──
  - id: ITDL-03
    module: M-DELIV
    check: 산출물의 검수·인수 기준(검사 항목·합격 기준)과 검수 기한·재검수 절차가 규정되어 있는가
    label: "검수·인수 기준"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [검수, 인수, 검사, 합격 기준, 검수 기한]
    absence_check: true
    sources: []
  - id: ITDL-04
    module: M-DELIV
    check: 검수 완료·인도 후 하자담보(무상 하자보수) 기간과 하자 대응 절차가 규정되어 있는가
    label: "하자담보 기간·절차"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [하자보수, 하자담보, 무상, 하자 보증, 결함]
    absence_check: true
    sources: []
    note: (수급인 하자담보책임 민법 제667조 근거 — 로컬 DB 미수록, 원문 미확인)
  - id: ITDL-05
    module: M-DELIV
    check: 유지보수의 대상·범위·대가와 별도계약 여부(무상 하자보수와의 구분)가 규정되어 있는가
    label: "유지보수 범위·대가"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [유지보수, 유지관리, 운영, 유상, 별도계약]
    absence_check: true
    sources: []
  - id: ITDL-06
    module: M-DELIV
    check: 서비스수준(SLA)·가동률 기준과 장애 발생 시 대응·보상·손해배상 조항이 있는가
    label: "SLA·장애 손해배상"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [SLA, 서비스수준, 가동률, 장애, 서비스 지연]
    absence_check: true
    sources: []
    note: 전자금융감독규정 제60조 제1항 제11호는 품질수준 연1회 평가 의무만 규정 — SLA 배상 수준은 계약 재량