# 공개 표준계약서 케이스(실전형): 공정위 표준하도급계약서(용역).
# 출처: 출처: 범용[용역(역무)업 분야] 표준하도급계약서 (공정거래위원회 제정 2024.12.24) | https://www.ftc.go.kr/www/downloadBbsFileAll.do?atchmnflNo=11259 (ZIP 내 HWP 전문) | 원문(HWP 전문 텍스트 추출, 총 53개 조 중 대표 조항 발췌)
# 고정: procurement 감지 + X-SUB(하도급법) 활성 + 비IT 용역에 SLA(ITDL-06) 부재알람 금지.
id: std-subcontract-service
desc: 공정위 표준하도급(용역) — procurement 감지·X-SUB 활성·SLA 오탐 금지
detect_expected: procurement
active_must_include: [X-SUB]
consider_must_exclude: [ITDL-06]
text: |
  제1조(목적) 이 계약은 원사업자가 수급사업자에게 의뢰하는 용역수행 및 그에 대한 대금지급 등에 관해 원사업자와 수급사업자간의 권리와 의무 등을 정하는 것을 목적으로 한다.

  제2조(정의) ① 이 계약에서 사용하는 용어의 정의는 다음과 같다.
   1. "발주자"라 함은 원사업자에게 용역수행을 의뢰한 자를 말한다.
   2. "선급금"이라 함은 용역수행을 완료하기 전에 원사업자가 수급사업자에게 지급하기로 한 하도급대금의 일부 또는 원사업자가 발주자로부터 용역수행을 완료하기 전에 지급받은 대금의 일부를 말한다.
   3. "지연이자"라 함은 하도급대금 또는 손해배상금 등을 지급하여야 할 자가 지급시기에 지급하지 않을 경우, 상대방에게 지급해야 할 손해배상금을 말한다.
   4. "지체상금"이라 함은 수급사업자가 계약만료일에 용역수행을 완료하지 않을 경우, 원사업자에게 지급해야 할 손해배상금을 말한다.
   5. "기술자료"라 함은 비밀로 관리되는 제조·수리·시공 또는 용역수행 방법에 관한 자료, 그 밖에 영업활동에 유용하고 독립된 경제적 가치를 가지는 것으로서 「하도급거래 공정화에 관한 법률」에서 정하는 자료를 말한다.
   6. "원재료"라 함은 하도급거래에서 용역수행에 사용되는 재료를 말하며, "주요 원재료"라 함은 그 비용이 하도급대금의 100분의 10 이상인 원재료를 말한다.
  ② 제1항에서 정한 용어 외의 용어에 대한 정의는 「하도급거래 공정화에 관한 법률」 등 관련 법령에서 정한 바에 따른다.

  제3조(계약의 기본원칙) ① 원사업자와 수급사업자는 이 계약에 따라 용역수행을 완료하고, 하도급대금 등을 지급함에 있어 상호 대등한 입장에서 신의성실의 원칙에 따라 자신의 권리를 행사하며, 의무를 이행한다.
  ② 원사업자와 수급사업자는 이 계약의 이행에 있어서 「하도급거래 공정화에 관한 법률」 등 관련 법령을 준수한다.
  ③ 원사업자와 수급사업자는 이 계약에 명시된 경우를 제외하고, 상대방을 대리하거나 상대방의 의무를 부담하지 아니한다.

  제16조(재하도급) ① 수급사업자는 이 계약에서 정한 용역을 직접 수행한다. 다만, 수급사업자는 원사업자의 동의를 받아 용역의 일부를 제3자에게 재하도급할 수 있다.
  ② 제1항 단서에 따라 재하도급한 경우, 수급사업자는 다음 각 호에서 정한 사항이 기재된 재하도급계약서(공정거래위원회가 제정 또는 개정한 표준하도급계약서)를 원사업자에게 제출한다.
   1. 하수급사업자
   2. 재하도급대상 용역의 범위 및 양
   3. 하수급사업자에 대한 하도급대금 지급 방법
   4. 그 밖에 「하도급거래 공정화에 관한 법률」에서 정한 사항 등

  제24조(검사 및 이의신청) ① 원사업자는 수급사업자가 수행한 용역이 이 계약에서 정한 바에 따라 수행되었는지의 여부를 검사한다.
  ② 용역에 대한 검사의 기준 및 방법은 원사업자와 수급사업자가 협의하여 객관적이고 공정·타당하게 정한다.
  ③ 원사업자가 수급사업자에게 용역에 대해 불합격으로 판정하는 경우에 그 사유를 구체적으로 기재하여 서면으로 통지한다.
  ④ 수급사업자는 정당한 사유가 있는 경우를 제외하고, 원사업자로부터 불합격 통지서를 받은 날로부터 10일 이내에 서면으로 이의를 신청할 수 있다. 이 경우에 원사업자는 정당한 사유가 있는 경우를 제외하고, 수급사업자의 이의신청을 받은 날로부터 10일 이내에 재검사의 결과를 서면으로 통지한다.
  ⑤ 제4항에 따른 재검사 비용은 다음 각 호에서 정한 바에 따른다.
   1. 재검사에서 합격한 경우 : 원사업자. 다만, 재검사를 위해 수급사업자가 보수 등을 하여 합격한 경우에는 수급사업자가 부담한다.
   2. 재검사에서 불합격한 경우 : 수급사업자

  제25조(부당한 위탁취소 등의 금지) 원사업자는 용역수행을 위탁한 후 수급사업자의 책임으로 돌릴 사유가 없는 경우에는 그 위탁을 임의로 취소하거나 변경하지 아니한다.

  제36조(대금의 지급 등) ① 원사업자는 이 계약에서 정한 하도급대금의 지급기일까지 수급사업자에게 하도급대금을 지급한다. 다만, 하도급대금의 지급기일은 용역수행 완료일부터 60일을 초과하지 아니한다.
  ② 원사업자는 발주자로부터 용역수행에 따라 대금을 받았을 때에는 하도급대금을, 용역수행의 진척에 따라 기성금 등을 받았을 때에는 수급사업자가 수행한 부분에 상당하는 금액을, 발주자로부터 그 대금이나 기성금 등을 지급받은 날부터 15일(대금의 지급기일이 그 전에 도래하는 경우에는 그 지급기일) 이내에 수급사업자에게 지급한다.
  ③ 원사업자가 수급사업자에게 하도급대금을 지급할 때에는 원사업자가 발주자로부터 해당 용역수행과 관련하여 받은 현금비율 이상으로 지급한다.
  ④ 원사업자가 하도급대금을 어음으로 지급하는 경우에는 해당 용역수행과 관련하여 발주자로부터 원사업자가 받은 어음의 지급기간(발행일부터 만기일까지)을 초과하는 어음을 지급하지 아니한다.

  제41조(개별약정 및 부당특약) ① 원사업자와 수급사업자는 이 계약에서 정하지 아니한 사항에 대하여 대등한 지위에서 상호 합의하여 서면으로 개별약정을 정할 수 있다. 이 경우, 원사업자는 수급사업자의 이익을 부당하게 침해하거나 제한하는 계약조건을 설정하지 아니한다.
  ② 기본계약 및 개별약정에서 정한 내용 중 다음 각 호의 어느 하나에 해당하는 약정은 무효로 한다.
   1. 원사업자가 기본계약 및 개별약정 등의 서면에 기재되지 아니한 사항을 요구함에 따라 발생된 비용을 수급사업자에게 부담시키는 약정
   2. 원사업자가 부담하여야 할 민원처리, 산업재해 등과 관련된 비용을 수급사업자에게 부담시키는 약정
   3. 원사업자가 입찰내역에 없는 사항을 요구함에 따라 발생된 비용을 수급사업자에게 부담시키는 약정

  제47조(손해배상) ① 원사업자 또는 수급사업자가 이 계약을 위반하여 상대방에게 손해를 입힌 경우 그 손해를 배상할 책임이 있다. 다만, 고의 또는 과실 없음을 증명한 경우에는 그러하지 아니하다.

  제49조(지체상금) ① 수급사업자가 정당한 사유없이 계약의 이행을 지체한 경우에 원사업자는 지체일수에 전문에서 정한 지체상금요율을 곱하여 산정한 지체상금을 수급사업자에게 청구할 수 있다.
  ② 제1항의 경우 기성부분 또는 완료부분을 원사업자가 검사를 거쳐 인수한 경우(인수하지 아니하고 관리·사용하고 있는 경우를 포함한다)에는 그 부분에 상당하는 금액을 대금에서 공제한 금액을 기준으로 지체상금을 계산한다. 이 경우 기성부분 또는 완료부분은 성질상 분할할 수 있는 용역에 대한 완성부분으로 인수한 것에 한한다.
  ③ 원사업자는 다음 각 호의 어느 하나에 해당한 경우 그 해당 일수를 제1항의 지체일수에 산입하지 아니한다.
   1. 태풍, 홍수, 기타 악천후, 전쟁 또는 사변, 지진, 화재, 폭동, 항만봉쇄, 방역 및 보안상 출입제한 등 불가항력의 사유에 의한 경우
   2. 원사업자가 지급하기로 한 원재료의 공급이 지연되는 사정으로 용역수행이 불가능하였을 경우
   3. 원사업자의 책임있는 사유로 용역수행이 지연되거나 중단된 경우
  ⑤ 원사업자는 제1항의 지체상금을 수급사업자에게 지급하여야 할 하도급대금 등에서 공제할 수 있다.

  제50조(하자담보책임 등) ① 검사에 합격한 용역에 하자가 있는 경우, 원사업자는 수급사업자에 대해 상당한 기간을 정하여 그 하자의 보수를 청구할 수 있다.
  ② 다음 각 호의 어느 하나의 사유로 발생한 하자에 대해서 원사업자는 제1항에 따른 하자 보수를 청구할 수 없다. 다만, 수급사업자가 그 부적당함을 알고 그 사실을 원사업자에게 고지하지 않은 경우에는 그러하지 아니하다.
   1. 발주자 또는 원사업자가 제공한 원재료로 인해 하자가 발생한 경우
   2. 발주자 또는 원사업자의 지시에 따라 용역을 수행하여 하자가 발생한 경우
  ④ 제1항 또는 제3항의 권리는 용역에 대한 검사결과가 합격으로 판정된 날로부터 전문에서 정한 기한 내에 행사한다.
  ⑤ 이 계약에서 정한 하자담보책임기간이 관련법령에서 정한 하자담보책임기간 보다 더 장기인 경우에는 관련법령에서 정한 기간으로 한다.

  제51조(계약의 해제 또는 해지) ① 원사업자 또는 수급사업자는 다음 각 호의 어느 하나에 해당하는 경우에는 서면으로 이 계약의 전부 또는 일부를 해제 또는 해지할 수 있다. 다만, 기성부분에 대해서는 해제하지 아니한다.
   1. 원사업자 또는 수급사업자가 금융기관으로부터 거래정지처분을 받아 이 계약을 이행할 수 없다고 인정되는 경우
   2. 원사업자 또는 수급사업자가 감독관청으로부터 인·허가의 취소, 영업취소·영업정지 등의 처분을 받아 이 계약을 이행할 수 없다고 인정되는 경우
   3. 원사업자 또는 수급사업자가 어음·수표의 부도, 제3자에 의한 강제집행(가압류 및 가처분 포함), 파산신청, 회생절차개시 또는 간이회생절차개시의 신청 등 영업상의 중대한 사유가 발생하여 이 계약을 이행할 수 없다고 인정되는 경우
  ② 원사업자 또는 수급사업자는 다음 각 호의 어느 하나에 해당하는 사유가 발생한 경우에는 상대방에게 상당한 기간을 정하여 서면으로 그 이행을 최고하고, 그 기간 내에 이를 이행하지 아니한 때에는 이 계약의 전부 또는 일부를 해제·해지할 수 있다. 다만, 원사업자 또는 수급사업자가 이행을 거절하거나 계약기간 내에 이행하여야 이 계약의 목적을 달성할 수 있는 경우에는 최고 없이 해제 또는 해지할 수 있다.
   1. 원사업자 또는 수급사업자가 이 계약상의 중요한 의무를 이행하지 않은 경우
