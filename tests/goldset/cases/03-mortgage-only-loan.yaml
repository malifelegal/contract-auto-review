# 회귀 케이스: 질권 부재알람 오탐 (2026-07-12 실사용 피드백)
# 저당만 설정하는 대출계약 — 질권(FIN-SEC-02)·양도담보(FIN-SEC-05) 부재알람이 떠선 안 됨.
# 조건부 부재체크(absence_precondition)가 억제해야 함.
id: mortgage-only-loan
desc: 근저당 대출계약(질권 언급 없음) — 질권·양도담보 부재알람 금지
detect_expected: finance
consider_must_exclude: [FIN-SEC-02, FIN-SEC-05]
text: |
  금전소비대차 및 근저당권설정 계약서

  제1조(대출) 갑은 을에게 금 삼억원을 대출하고 을은 이를 차용한다.
  제2조(이자) 이자는 연 4.5퍼센트로 하고 매월 말일에 지급한다.
  제3조(담보) 을은 대출채권의 담보로 을 소유 부동산에 근저당권을 설정한다. 채권최고액은 금 삼억구천만원으로 한다.
  제4조(기한이익 상실) 을이 이자 지급을 2회 이상 지체한 때에는 기한의 이익을 상실한다.
  제5조(변제) 을은 대출 원리금을 만기일에 일시 변제한다.
